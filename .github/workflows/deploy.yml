name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync .env to server
        if: ${{ secrets.PROD_ENV_FILE != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: PROD_ENV_FILE
          script: |
            echo "$PROD_ENV_FILE" > /opt/ai-translator/.env
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-translator
            git fetch origin
            git reset --hard origin/main
            npm install --omit=dev
            pm2 restart ai-translator
