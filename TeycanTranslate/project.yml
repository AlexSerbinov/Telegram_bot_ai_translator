name: TeycanTranslate

options:
  bundleIdPrefix: solutions.techchain.teycan
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: uk
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: "125.0.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: JBZQPPB4YV
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
  configs:
    Debug:
      ENABLE_TESTABILITY: YES

targets:
  TeycanTranslate:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources/Fonts
        type: group
      - path: Resources/Assets.xcassets
    dependencies:
      - package: WebRTC
        product: WebRTC
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: "Teycan Translate"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSMicrophoneUsageDescription: >-
          Teycan Translate потребує доступ до мікрофона, щоб перекладати ваше
          мовлення в реальному часі.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UIAppFonts:
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solutions.techchain.teycan.translate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: TeycanTranslate.entitlements

  TeycanTranslateTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: TeycanTranslate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solutions.techchain.teycan.translate.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/TeycanTranslate.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TeycanTranslate
