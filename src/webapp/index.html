    // ===== Start =====
    init();
    // ===================================================================
    // Tab navigation: Voice (legacy) ↔ Live (streaming)
    // ===================================================================
    (function setupTabs() {
      const TAB_LS_KEY = 'index.html:activeTab';
      const navBtns = document.querySelectorAll('.nav-tab');
      const tabs = document.querySelectorAll('.tab-content');
      const titleEl = document.getElementById('appTitle');
      const TITLES = {
        voice: 'Voice Translator',
        live: 'Live Translator',
        realtime: 'Realtime Translator',
        chat: 'Chat (gpt-realtime)',
      };

      function activate(name) {
        navBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === name));
        tabs.forEach(t => { t.hidden = t.dataset.tab !== name; });
        if (titleEl && TITLES[name]) titleEl.textContent = TITLES[name];
        try { localStorage.setItem(TAB_LS_KEY, name); } catch {}
        // When leaving any session-bearing tab, hard-stop it. Realtime/Chat are
        // the cost-critical ones — never let them linger on tab switch.
        if (name !== 'live' && window.LiveTab && window.LiveTab.stopIfRunning) {
          try { window.LiveTab.stopIfRunning(); } catch {}
        }
        if (name !== 'realtime' && window.RealtimeTab && window.RealtimeTab.stopIfRunning) {
          try { window.RealtimeTab.stopIfRunning('tab-switch'); } catch {}
        }
        if (name !== 'chat' && window.ChatTab && window.ChatTab.stopIfRunning) {
          try { window.ChatTab.stopIfRunning('tab-switch'); } catch {}
        }
        // Lazy-init the tab UI on first entry.
        if (name === 'live' && window.LiveTab && !window.LiveTab._initialized) {
          try { window.LiveTab.init(); } catch (e) { console.error('Live init', e); }
        }
        if (name === 'realtime' && window.RealtimeTab && !window.RealtimeTab._initialized) {
          try { window.RealtimeTab.init(); } catch (e) { console.error('Realtime init', e); }
        }
        if (name === 'chat' && window.ChatTab && !window.ChatTab._initialized) {
          try { window.ChatTab.init(); } catch (e) { console.error('Chat init', e); }
        }
      }

      navBtns.forEach(b => b.addEventListener('click', () => activate(b.dataset.tab)));

      // Initial tab: ?tab=… → localStorage → 'voice'
      const VALID_TABS = new Set(['voice', 'live', 'realtime', 'chat']);
      let initial = 'voice';
      const params = new URLSearchParams(location.search);
      const qp = params.get('tab');
      if (qp && VALID_TABS.has(qp)) initial = qp;
      else {
        try {
          const saved = localStorage.getItem(TAB_LS_KEY);
          if (saved && VALID_TABS.has(saved)) initial = saved;
        } catch {}
      }
      // Defer so DOM/loading state finishes
      setTimeout(() => activate(initial), 0);
    })();

    // ===================================================================
    // Live Tab — backend-orchestrated streaming translator
    // Thin client: captures mic → /ws/live → renders transcripts/audio.
    // All AI logic (STT/MT/TTS/trigger/auto-speed) lives on the server.
    // ===================================================================
    window.LiveTab = (function() {
      const SAMPLE_RATE = 16000;
      const LANGS = [
        { code: 'es', name: 'Spanish',    flag: '🇪🇸' },
        { code: 'en', name: 'English',    flag: '🇺🇸' },
        { code: 'ru', name: 'Russian',    flag: '🇷🇺' },
        { code: 'uk', name: 'Ukrainian',  flag: '🇺🇦' },
        { code: 'de', name: 'German',     flag: '🇩🇪' },
        { code: 'fr', name: 'French',     flag: '🇫🇷' },
        { code: 'it', name: 'Italian',    flag: '🇮🇹' },
        { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
        { code: 'pl', name: 'Polish',     flag: '🇵🇱' },
        { code: 'tr', name: 'Turkish',    flag: '🇹🇷' },
        { code: 'nl', name: 'Dutch',      flag: '🇳🇱' },
        { code: 'cs', name: 'Czech',      flag: '🇨🇿' },
        { code: 'ja', name: 'Japanese',   flag: '🇯🇵' },
        { code: 'zh', name: 'Chinese',    flag: '🇨🇳' },
        { code: 'ar', name: 'Arabic',     flag: '🇸🇦' },
      ];
      const SRC_LS = 'live.src';
      const TGT_LS = 'live.tgt';
      const SPEED_LS = 'live.speed';
      const AUTO_LS = 'live.auto';
      const TTS_LS = 'live.tts';

      let state = {
        running: false, ws: null, audioCtx: null, mediaStream: null, sourceNode: null, workletNode: null,
        outputCtx: null, nextPlayTime: 0,
        sourceLang: localStorage.getItem(SRC_LS) || 'es',
        targetLang: localStorage.getItem(TGT_LS) || 'uk',
        voiceSpeed: parseFloat(localStorage.getItem(SPEED_LS) || '1.0'),
        autoSpeed: localStorage.getItem(AUTO_LS) === '1',
        ttsProvider: localStorage.getItem(TTS_LS) || 'soniox',
        chunkCount: 0,
        srcAccumulated: '',
        srcInterim: '',
        tgtCommitted: '',
      };
      let queueReportInterval = null;

      const api = { _initialized: false, init, stopIfRunning };
      return api;

      // -----------------------------------------------------------------
      function init() {
        if (api._initialized) return;
        api._initialized = true;
        renderShell();
        bindControls();
      }

      function $(id) { return document.getElementById(id); }
      function log(msg, cls) {
        const el = $('liveLog'); if (!el) return;
        const line = document.createElement('div');
        line.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
        if (cls) line.classList.add(cls);
        el.appendChild(line); el.scrollTop = el.scrollHeight;
      }

      function renderShell() {
        const root = document.getElementById('liveTabRoot');
        if (!root) return;
        const langOptions = LANGS.map(l => `<option value="${l.code}">${l.flag}  ${l.name} (${l.code})</option>`).join('');
        root.innerHTML = `
          <div class="live-root">
            <div class="live-langs">
              <select id="liveSrc">${langOptions}</select>
              <span class="arrow">→</span>
              <select id="liveTgt">${langOptions}</select>
              <button id="liveSwap" class="swap-btn" type="button" title="Swap">⇄</button>
            </div>

            <div class="live-langs" id="liveTtsRow">
              <label style="font-size:12px;color:var(--text-secondary)">Voice:</label>
              <select id="liveTtsProvider">
                <option value="soniox">🎙 Soniox (multilingual)</option>
                <option value="eleven">🎤 ElevenLabs Flash</option>
              </select>
            </div>

            <div class="live-speed">
              <label>⚡ Speed</label>
              <input id="liveSpeedSlider" type="range" min="0.7" max="2.0" step="0.05" value="${state.voiceSpeed}">
              <span class="speed-val" id="liveSpeedVal">${state.voiceSpeed.toFixed(2)}×</span>
              <label class="auto-toggle"><input type="checkbox" id="liveAutoSpeed" ${state.autoSpeed ? 'checked' : ''}> Auto</label>
            </div>

            <div class="live-controls">
              <button class="live-start" id="liveStartBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
            </div>

            <div class="live-card source">
              <div class="label"><span id="liveSrcLabel">Spanish (live)</span><span id="liveSrcStatus">idle</span></div>
              <div class="text-area" id="liveSrcText">—</div>
            </div>

            <div class="live-card target">
              <div class="label"><span id="liveTgtLabel">Ukrainian</span><span id="liveTgtStatus">—</span></div>
              <div class="text-area" id="liveTgtText">—</div>
            </div>

            <div class="live-metrics">
              <div class="live-metric"><div class="v" id="lmTrans">—</div><div class="k">Trans ms</div></div>
              <div class="live-metric"><div class="v" id="lmTts">—</div><div class="k">TTS 1st byte</div></div>
              <div class="live-metric"><div class="v" id="lmQueue">0.0s</div><div class="k">Queue</div></div>
              <div class="live-metric"><div class="v" id="lmSpeed">${state.voiceSpeed.toFixed(2)}×</div><div class="k">Speed</div></div>
            </div>

            <div class="live-card">
              <div class="label">Log</div>
              <div class="live-log" id="liveLog"></div>
            </div>
          </div>
        `;
        $('liveSrc').value = state.sourceLang;
        $('liveTgt').value = state.targetLang;
        $('liveTtsProvider').value = state.ttsProvider;
        refreshLabels();
      }

      function refreshLabels() {
        const s = LANGS.find(l => l.code === state.sourceLang);
        const t = LANGS.find(l => l.code === state.targetLang);
        if (s) $('liveSrcLabel').textContent = `${s.flag} ${s.name} (live)`;
        if (t) $('liveTgtLabel').textContent = `${t.flag} ${t.name}`;
      }

      function bindControls() {
        $('liveSrc').addEventListener('change', () => {
          state.sourceLang = $('liveSrc').value;
          localStorage.setItem(SRC_LS, state.sourceLang); refreshLabels();
        });
        $('liveTgt').addEventListener('change', () => {
          state.targetLang = $('liveTgt').value;
          localStorage.setItem(TGT_LS, state.targetLang); refreshLabels();
        });
        $('liveTtsProvider').addEventListener('change', () => {
          state.ttsProvider = $('liveTtsProvider').value;
          localStorage.setItem(TTS_LS, state.ttsProvider);
          log(`[tts] provider → ${state.ttsProvider} (applies on next Start)`);
        });
        $('liveSwap').addEventListener('click', () => {
          const a = state.sourceLang, b = state.targetLang;
          state.sourceLang = b; state.targetLang = a;
          $('liveSrc').value = b; $('liveTgt').value = a;
          localStorage.setItem(SRC_LS, b); localStorage.setItem(TGT_LS, a);
          refreshLabels();
        });
        $('liveSpeedSlider').addEventListener('input', () => {
          if (state.autoSpeed) return;
          state.voiceSpeed = parseFloat($('liveSpeedSlider').value);
          $('liveSpeedVal').textContent = state.voiceSpeed.toFixed(2) + '×';
          $('lmSpeed').textContent = state.voiceSpeed.toFixed(2) + '×';
          localStorage.setItem(SPEED_LS, String(state.voiceSpeed));
          if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({ type: 'set_speed', value: state.voiceSpeed }));
          }
        });
        $('liveAutoSpeed').addEventListener('change', () => {
          state.autoSpeed = $('liveAutoSpeed').checked;
          localStorage.setItem(AUTO_LS, state.autoSpeed ? '1' : '0');
          $('liveSpeedSlider').disabled = state.autoSpeed;
          if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({ type: 'set_auto', enabled: state.autoSpeed }));
          }
        });
        $('liveSpeedSlider').disabled = state.autoSpeed;
        $('liveStartBtn').addEventListener('click', () => {
          if (state.running) stop();
          else start().catch(e => { log('[start-error] ' + e.message, 'err'); stop(); });
        });
      }

      // -----------------------------------------------------------------
      async function start() {
        if (state.sourceLang === state.targetLang) { log('[err] source = target', 'err'); return; }
        state.chunkCount = 0; state.srcAccumulated = ''; state.srcInterim = ''; state.tgtCommitted = '';
        $('liveSrcText').textContent = '—'; $('liveTgtText').textContent = '—';
        $('lmTrans').textContent = '—'; $('lmTts').textContent = '—';

        await ensureOutputCtx();
        await openMic();

        // Open backend WS
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws/live`);
        ws.binaryType = 'arraybuffer';
        state.ws = ws;
        ws.addEventListener('open', () => {
          ws.send(JSON.stringify({
            type: 'init',
            sourceLang:  state.sourceLang,
            targetLang:  state.targetLang,
            voiceSpeed:  state.voiceSpeed,
            autoSpeed:   state.autoSpeed,
            ttsProvider: state.ttsProvider,
          }));
          log('[ws] open, init sent');
        });
        ws.addEventListener('message', onWsMessage);
        ws.addEventListener('error', () => log('[ws] error', 'err'));
        ws.addEventListener('close', (ev) => log(`[ws] closed code=${ev.code}`));

        state.running = true;
        $('liveStartBtn').classList.add('live');
        $('liveSrcStatus').textContent = 'connecting…';
        // periodic queue-state report → drives server auto-speed
        queueReportInterval = setInterval(() => {
          if (!state.running || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
          const q = getQueuedAudioSec();
          state.ws.send(JSON.stringify({ type: 'queue_state', queueSec: q }));
          $('lmQueue').textContent = q.toFixed(1) + 's';
        }, 250);
      }

      async function stop() {
        state.running = false;
        if (queueReportInterval) { clearInterval(queueReportInterval); queueReportInterval = null; }
        try { state.workletNode?.disconnect(); } catch {}
        try { state.sourceNode?.disconnect(); } catch {}
        try { state.mediaStream?.getTracks().forEach(t => t.stop()); } catch {}
        try { state.audioCtx?.close(); } catch {}
        state.workletNode = state.sourceNode = state.mediaStream = state.audioCtx = null;
        if (state.ws) {
          try { if (state.ws.readyState === WebSocket.OPEN) state.ws.send(JSON.stringify({ type: 'stop' })); } catch {}
          try { state.ws.close(); } catch {}
          state.ws = null;
        }
        $('liveStartBtn')?.classList.remove('live');
        if ($('liveSrcStatus')) $('liveSrcStatus').textContent = 'stopped';
      }
      function stopIfRunning() { if (state.running) stop(); }

      // -----------------------------------------------------------------
      function onWsMessage(ev) {
        if (ev.data instanceof ArrayBuffer || (typeof Blob !== 'undefined' && ev.data instanceof Blob)) {
          // Binary PCM frame
          if (ev.data instanceof Blob) ev.data.arrayBuffer().then(playPcmChunk);
          else playPcmChunk(ev.data);
          return;
        }
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        switch (msg.type) {
          case 'started':
            $('liveSrcStatus').textContent = 'live';
            log('[server] started', 'ok');
            break;
          case 'src_partial':
            state.srcInterim = msg.text || '';
            renderSource();
            break;
          case 'src_final':
            state.srcAccumulated += msg.text || '';
            state.srcInterim = '';
            renderSource();
            break;
          case 'tgt_chunk':
            if (msg.dropReason) {
              log(`[guard] ${msg.dropReason}`, 'err');
            } else if (msg.text) {
              state.tgtCommitted = (state.tgtCommitted ? state.tgtCommitted + ' ' : '') + msg.text;
              renderTarget();
              state.chunkCount++;
              $('lmTrans').textContent = msg.transMs + 'ms';
              log(`[chunk #${state.chunkCount}] (${msg.mode}) "${msg.text.slice(0, 60)}"`, 'ok');
            }
            break;
          case 'tts_first_byte':
            $('lmTts').textContent = msg.latencyMs + 'ms';
            break;
          case 'metrics':
            if (state.autoSpeed) {
              state.voiceSpeed = msg.currentSpeed;
              $('liveSpeedSlider').value = String(msg.currentSpeed);
              $('liveSpeedVal').textContent = msg.currentSpeed.toFixed(2) + '×';
            }
            $('lmSpeed').textContent = (msg.currentSpeed || state.voiceSpeed).toFixed(2) + '×';
            break;
          case 'log':
            log(`[server] ${msg.level}: ${msg.msg}`, msg.level === 'error' ? 'err' : '');
            break;
          case 'error':
            log(`[server-error] ${msg.message}`, 'err');
            break;
          case 'done':
            log('[server] done');
            break;
        }
      }

      function renderSource() {
        const el = $('liveSrcText');
        el.innerHTML = '';
        if (state.srcAccumulated) {
          const a = document.createElement('span'); a.textContent = state.srcAccumulated + ' '; el.appendChild(a);
        }
        if (state.srcInterim) {
          const b = document.createElement('span'); b.className = 'interim'; b.textContent = state.srcInterim; el.appendChild(b);
        }
        if (!state.srcAccumulated && !state.srcInterim) el.textContent = '—';
      }
      function renderTarget() {
        $('liveTgtText').textContent = state.tgtCommitted || '—';
      }

      // ===== Mic capture (AudioWorklet, 16 kHz s16le) → ws.send(audio_b64) =====
      async function openMic() {
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
        if (state.audioCtx.state === 'suspended') await state.audioCtx.resume();
        state.mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true },
        });
        state.sourceNode = state.audioCtx.createMediaStreamSource(state.mediaStream);
        const workletCode = `
          class PCMWorklet extends AudioWorkletProcessor {
            constructor() { super(); this.buf = new Int16Array(0); this.target = 1600; }
            process(inputs) {
              const input = inputs[0][0];
              if (!input) return true;
              const merged = new Int16Array(this.buf.length + input.length);
              merged.set(this.buf, 0);
              for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                merged[this.buf.length + i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
              }
              if (merged.length >= this.target) {
                this.port.postMessage(merged.buffer, [merged.buffer]);
                this.buf = new Int16Array(0);
              } else { this.buf = merged; }
              return true;
            }
          }
          registerProcessor('live-pcm-worklet', PCMWorklet);
        `;
        const blobUrl = URL.createObjectURL(new Blob([workletCode], { type: 'application/javascript' }));
        await state.audioCtx.audioWorklet.addModule(blobUrl);
        state.workletNode = new AudioWorkletNode(state.audioCtx, 'live-pcm-worklet');
        state.workletNode.port.onmessage = (e) => {
          if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
          const bytes = new Uint8Array(e.data);
          let bin = '';
          const chunkSize = 0x8000;
          for (let i = 0; i < bytes.length; i += chunkSize) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
          state.ws.send(JSON.stringify({ type: 'audio_b64', data: btoa(bin) }));
        };
        state.sourceNode.connect(state.workletNode);
      }

      // ===== Output PCM playback (24 kHz from server, with playbackRate for residual stretch) =====
      async function ensureOutputCtx() {
        if (!state.outputCtx) state.outputCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        if (state.outputCtx.state === 'suspended') await state.outputCtx.resume();
        state.nextPlayTime = state.outputCtx.currentTime;
      }
      function playPcmChunk(arrayBuffer) {
        if (!state.outputCtx) return;
        const view = new DataView(arrayBuffer);
        const samples = arrayBuffer.byteLength / 2;
        const float = new Float32Array(samples);
        for (let i = 0; i < samples; i++) float[i] = view.getInt16(i * 2, true) / 32768;
        const buf = state.outputCtx.createBuffer(1, samples, 24000);
        buf.getChannelData(0).set(float);
        const src = state.outputCtx.createBufferSource();
        src.buffer = buf;
        // Server-side speed already capped at 1.2× by ElevenLabs Flash; residual >1.2× via playbackRate.
        const serverCapped = Math.min(state.voiceSpeed, 1.2);
        const clientRate = state.voiceSpeed / serverCapped;
        src.playbackRate.value = clientRate;
        src.connect(state.outputCtx.destination);
        const startAt = Math.max(state.outputCtx.currentTime, state.nextPlayTime);
        src.start(startAt);
        state.nextPlayTime = startAt + (buf.duration / clientRate);
      }
      function getQueuedAudioSec() {
        if (!state.outputCtx) return 0;
        return Math.max(0, state.nextPlayTime - state.outputCtx.currentTime);
      }
    })();

    // ===================================================================
    // Realtime Tab — OpenAI gpt-realtime-translate over browser↔OpenAI WebRTC.
    //
    // CRITICAL: cost guard. The model is metered. Stop must reliably terminate
    // the WebRTC session. Multiple kill paths:
    //   - manual Stop button
    //   - timer (3 min base, +2 min on Continue press during 30s warn window)
    //   - document.visibilitychange / window.pagehide / beforeunload
    //   - tab-switch via stopIfRunning('tab-switch') from the tab switcher
    //   - watchdog every 5s asserts pc/mic null when not running
    //   - Telegram MainButton acts as native "STOP" while running
    // ===================================================================
    window.RealtimeTab = (function() {
      // ---- config ----

      const BASE_LIFE_MS = 3 * 60 * 1000;    // initial session = 3 min

      // OpenAI Realtime Translation supported target languages.
      // Ukrainian is NOT in this list — use ru as default.
      const TARGETS = [
        { code: 'ru', name: 'Russian',    flag: '🇷🇺' },
        { code: 'es', name: 'Spanish',    flag: '🇪🇸' },
        { code: 'en', name: 'English',    flag: '🇺🇸' },
        { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
        { code: 'fr', name: 'French',     flag: '🇫🇷' },
        { code: 'de', name: 'German',     flag: '🇩🇪' },
        { code: 'it', name: 'Italian',    flag: '🇮🇹' },
        { code: 'ja', name: 'Japanese',   flag: '🇯🇵' },
        { code: 'ko', name: 'Korean',     flag: '🇰🇷' },
        { code: 'zh', name: 'Chinese',    flag: '🇨🇳' },
        { code: 'hi', name: 'Hindi',      flag: '🇮🇳' },
        { code: 'id', name: 'Indonesian', flag: '🇮🇩' },
        { code: 'vi', name: 'Vietnamese', flag: '🇻🇳' },
      ];
      // Source picker is informational only (model auto-detects). Add UA + a few non-target langs.
      const SOURCES = [
        { code: 'es', name: 'Spanish',    flag: '🇪🇸' },
        { code: 'uk', name: 'Ukrainian',  flag: '🇺🇦' },
        { code: 'en', name: 'English',    flag: '🇺🇸' },
        { code: 'ru', name: 'Russian',    flag: '🇷🇺' },
        { code: 'pt', name: 'Portuguese', flag: '🇵🇹' },
        { code: 'fr', name: 'French',     flag: '🇫🇷' },
        { code: 'de', name: 'German',     flag: '🇩🇪' },
        { code: 'it', name: 'Italian',    flag: '🇮🇹' },
        { code: 'ja', name: 'Japanese',   flag: '🇯🇵' },
        { code: 'ko', name: 'Korean',     flag: '🇰🇷' },
        { code: 'zh', name: 'Chinese',    flag: '🇨🇳' },
      ];

      // ---- state (module-private) ----
      const state = {
        running: false,
        sourceLang: localStorage.getItem(RT_SRC_LS) || 'es',
        targetLang: localStorage.getItem(RT_TGT_LS) || 'ru',
        micDeviceId: localStorage.getItem(RT_DEV_LS) || '',
        volume: clamp01(parseFloat(localStorage.getItem(RT_VOL_LS) ?? '1') || 1),
        pc: null, dc: null, micStream: null, audioEl: null,
        sessionStartedAt: 0,
        stopDeadline: 0,
        srcAccum: '', srcInterim: '', tgtAccum: '',
        eventCount: 0,
      };
      let warnTimer = null, stopTimer = null, sessionTimer = null, statsTimer = null, watchdogTimer = null;

      const api = { _initialized: false, init, stopIfRunning };
      return api;

      // ---- helpers ----
      function $id(id) { return document.getElementById(id); }
      function clamp01(v) { return Math.max(0, Math.min(1, isFinite(v) ? v : 1)); }
      function mmss(ms) { const s = Math.max(0, Math.floor(ms / 1000)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
      function log(msg, cls) {
        const el = $id('rtLog'); if (!el) return;
        const line = document.createElement('div');
        line.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
        if (cls) line.classList.add(cls);
        el.appendChild(line); el.scrollTop = el.scrollHeight;
      }

      // ---- init / shell ----
      function init() {
        if (api._initialized) return;
        api._initialized = true;
        renderShell();
        bindControls();
        loadAudioDevices(false);
        // Module-level guards (registered once, persist across sessions).
        // Telegram WebView occasionally fires visibilitychange spuriously (keyboard,
        // gestures, status bar pull). Use a 5s grace window before killing — if
        // the page is still hidden after that, assume real backgrounding.
        let hiddenKillTimer = null;
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && state.running) {
            log('[guard] page hidden — 5s grace before auto-stop');
            hiddenKillTimer = setTimeout(() => {
              if (document.hidden && state.running) hardStop('hidden-5s');
            }, 5000);
          } else if (!document.hidden && hiddenKillTimer) {
            clearTimeout(hiddenKillTimer); hiddenKillTimer = null;
            log('[guard] visible again — kill cancelled', 'ok');
          }
        });
        window.addEventListener('pagehide', () => { if (state.running) hardStop('pagehide'); });
        window.addEventListener('beforeunload', () => { if (state.running) hardStop('unload'); });
        // Watchdog: every 5s, if not running, assert no leaked WebRTC objects.
        watchdogTimer = setInterval(() => {
          if (state.running) return;
          if (state.pc || state.micStream) {
            log('[watchdog] LEAK detected — forcing hardStop again', 'err');
            hardStop('watchdog-leak');
          }
        }, 5000);
      }

      function renderShell() {
        const root = $id('realtimeTabRoot');
        if (!root) return;
        const srcOpts = SOURCES.map(l => `<option value="${l.code}">${l.flag}  ${l.name} (${l.code})</option>`).join('');
        const tgtOpts = TARGETS.map(l => `<option value="${l.code}">${l.flag}  ${l.name} (${l.code})</option>`).join('');
        root.innerHTML = `
          <div class="live-root">
            <div class="live-langs">
              <select id="rtSrc">${srcOpts}</select>
              <span class="arrow">→</span>
              <select id="rtTgt">${tgtOpts}</select>
              <button id="rtSwap" class="swap-btn" type="button" title="Swap">⇄</button>
            </div>
            <div style="text-align:center;font-size:11px;color:var(--text-secondary);margin-top:-2px">
              Source is auto-detected by the model. Target = what you'll hear.
            </div>

            <!-- Visible LIVE indicator while session is running. Hidden otherwise. -->
            <div id="rtSessionBar" hidden style="text-align:center;padding:8px 12px;margin-top:10px;background:rgba(229,57,53,0.10);border:1px solid rgba(229,57,53,0.30);border-radius:12px;font-family:ui-monospace,monospace;color:var(--recording);font-weight:700;letter-spacing:0.3px;font-size:13px">
              🔴 OpenAI LIVE — <span id="rtElapsed">0:00</span>
              <span style="color:var(--text-secondary);font-weight:500;font-size:11px"> / deadline <span id="rtDeadlineLeft">3:00</span></span>
            </div>

            <div class="live-controls">
              <button class="live-start" id="rtStartBtn" type="button" aria-label="Start / Stop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
            </div>

            <!-- Continue +2 min row (only shown after warn fires). -->
            <div class="live-controls" id="rtContinueRow" hidden style="flex-direction:column;gap:8px;align-items:center">
              <div style="font-size:12px;color:var(--recording);font-weight:600">⏰ <span id="rtWarnLeft">30</span>s до автозупинки (економія коштів)</div>
              <button class="swap-btn" id="rtContinueBtn" type="button" style="padding:8px 18px;font-weight:700;background:var(--recording);color:#fff;border-color:var(--recording)">Продовжити ще +2 хв</button>
            </div>

            <div class="live-card source">
              <div class="label"><span id="rtSrcLabel">Spanish (heard)</span><span id="rtSrcStatus">idle</span></div>
              <div class="text-area" id="rtSrcText">—</div>
            </div>

            <div class="live-card target">
              <div class="label"><span id="rtTgtLabel">Russian (translation)</span><span id="rtTgtStatus">—</span></div>
              <div class="text-area" id="rtTgtText">—</div>
            </div>

            <div class="rt-row" style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:12px;color:var(--text-secondary)">
              🎙
              <select id="rtMic" style="background:#fff;color:var(--text-primary);border:1px solid var(--divider);border-radius:8px;padding:6px 8px;font-size:12px;max-width:220px"><option value="">Default</option></select>
              <button id="rtRefreshMic" type="button" style="background:transparent;color:var(--text-secondary);border:1px solid var(--divider);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer">↻</button>
            </div>
            <div class="rt-row" style="display:flex;gap:10px;align-items:center;justify-content:center;font-size:12px;color:var(--text-secondary)">
              🔊 <input id="rtVol" type="range" min="0" max="100" step="1" style="flex:1;max-width:200px;accent-color:var(--accent)">
              <span id="rtVolVal" style="font-family:ui-monospace,monospace;font-weight:700;color:var(--accent);min-width:42px;text-align:right">100%</span>
            </div>

            <div class="live-card">
              <div class="label">
                <span>Log</span>
                <button id="rtCopyLog" type="button" style="background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;cursor:pointer">📋 Copy</button>
              </div>
              <div class="live-log" id="rtLog"></div>
            </div>

            <!-- iOS Telegram WebView needs the audio element in DOM with playsinline+autoplay. -->
            <audio id="rtOaAudio" playsinline autoplay style="display:none"></audio>
          </div>
        `;
        $id('rtSrc').value = state.sourceLang;
        $id('rtTgt').value = state.targetLang;
        $id('rtVol').value = String(Math.round(state.volume * 100));
        $id('rtVolVal').textContent = `${Math.round(state.volume * 100)}%`;
        refreshLabels();
      }

      function refreshLabels() {
        const s = SOURCES.find(l => l.code === state.sourceLang);
        const t = TARGETS.find(l => l.code === state.targetLang);
        if (s) $id('rtSrcLabel').textContent = `${s.flag} ${s.name} (heard)`;
        if (t) $id('rtTgtLabel').textContent = `${t.flag} ${t.name} (translation)`;
      }

      function bindControls() {
        $id('rtSrc').addEventListener('change', () => {
          state.sourceLang = $id('rtSrc').value;
          localStorage.setItem(RT_SRC_LS, state.sourceLang);
          refreshLabels();
        });
        $id('rtTgt').addEventListener('change', () => {
          state.targetLang = $id('rtTgt').value;
          localStorage.setItem(RT_TGT_LS, state.targetLang);
          refreshLabels();
          // If session is running, push the new target on the fly via data channel.
          if (state.dc && state.dc.readyState === 'open') {
            try {
              state.dc.send(JSON.stringify({
                type: 'session.update',
                session: { audio: { output: { language: state.targetLang } } },
              }));
              log(`[session.update] target → ${state.targetLang}`, 'ok');
            } catch (e) { log(`[session.update] failed: ${e.message}`, 'err'); }
          }
        });
        $id('rtSwap').addEventListener('click', () => {
          // Swap source/target if target is in SOURCES list and source is in TARGETS list.
          const newTgtCode = state.sourceLang;
          const newSrcCode = state.targetLang;
          if (TARGETS.find(l => l.code === newTgtCode) && SOURCES.find(l => l.code === newSrcCode)) {
            state.sourceLang = newSrcCode;
            state.targetLang = newTgtCode;
            $id('rtSrc').value = newSrcCode;
            $id('rtTgt').value = newTgtCode;
            localStorage.setItem(RT_SRC_LS, newSrcCode);
            localStorage.setItem(RT_TGT_LS, newTgtCode);
            refreshLabels();
          } else {
            log('[swap] cannot swap — one side not in allowed list', 'err');
          }
        });

        $id('rtMic').addEventListener('change', () => {
          state.micDeviceId = $id('rtMic').value || '';
          localStorage.setItem(RT_DEV_LS, state.micDeviceId);
        });
        $id('rtRefreshMic').addEventListener('click', () => loadAudioDevices(true));

        $id('rtVol').addEventListener('input', () => {
          const pct = Number($id('rtVol').value);
          state.volume = clamp01(pct / 100);
          localStorage.setItem(RT_VOL_LS, String(state.volume));
          $id('rtVolVal').textContent = `${pct}%`;
          if (state.audioEl) state.audioEl.volume = state.volume;
        });

        $id('rtStartBtn').addEventListener('click', () => {
          if (state.running) hardStop('manual');
          else start().catch(e => { log(`[start] error: ${e.message}`, 'err'); hardStop('error:' + e.message); });
        });

        $id('rtContinueBtn').addEventListener('click', () => {
          // Extend deadline by +2 min added to the EXISTING deadline.
          state.stopDeadline += EXTEND_MS;
          $id('rtContinueRow').hidden = true;
          armTimers();
          const totalMs = state.stopDeadline - state.sessionStartedAt;
          log(`[continue] deadline extended → +2:00 (total ${mmss(totalMs)})`, 'ok');
        });

        $id('rtCopyLog').addEventListener('click', () => copyLogToClipboard($id('rtCopyLog'), $id('rtLog')));
      }

      async function loadAudioDevices(promptForPermission) {
        try {
          if (promptForPermission) {
            try {
              const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
              tmp.getTracks().forEach(t => t.stop());
            } catch (e) { log(`[mic] permission denied: ${e.message}`, 'err'); }
          }
          const devices = await navigator.mediaDevices.enumerateDevices();
          const inputs = devices.filter(d => d.kind === 'audioinput');
          const sel = $id('rtMic');
          sel.innerHTML = '<option value="">Default</option>';
          for (const d of inputs) {
            const label = d.label || `Microphone ${d.deviceId.slice(0, 6)}`;
            const opt = new Option(label, d.deviceId);
            sel.add(opt);
          }
          if (state.micDeviceId && inputs.some(d => d.deviceId === state.micDeviceId)) {
            sel.value = state.micDeviceId;
          } else {
            state.micDeviceId = '';
          }
        } catch (e) { log(`[mic] enumerate failed: ${e.message}`, 'err'); }
      }

      // ---- start ----
      async function start() {
        if (state.running) return;
        state.srcAccum = state.srcInterim = state.tgtAccum = '';
        state.eventCount = 0;
        $id('rtSrcText').textContent = '—';
        $id('rtTgtText').textContent = '—';

        // Attach in-DOM audio element NOW (synchronously, on user-gesture frame)
        // so iOS lets us .play() with srcObject later.
        state.audioEl = $id('rtOaAudio');
        if (state.audioEl) {
          state.audioEl.muted = false;
          state.audioEl.volume = state.volume;
          try { const p = state.audioEl.play(); if (p && p.catch) p.catch(() => {}); } catch {}
        }

        state.running = true;
        $id('rtStartBtn').classList.add('live');
        $id('rtSrcStatus').textContent = 'connecting…';

        log('[openai] requesting mic…');
        const constraints = {
          audio: state.micDeviceId
            ? { deviceId: { exact: state.micDeviceId }, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
            : { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
          video: false,
        };
        state.micStream = await navigator.mediaDevices.getUserMedia(constraints);
        const micTrack = state.micStream.getAudioTracks()[0];
        if (micTrack) {
          log(`[openai] mic: ready=${micTrack.readyState}, enabled=${micTrack.enabled}, label="${micTrack.label}"`, 'ok');
        } else {
          throw new Error('getUserMedia returned no audio track');
        }

        log(`[openai] creating session (target=${state.targetLang})…`);
        const sessRes = await fetch('/api/realtime/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetLanguage: state.targetLang }),
        });
        const sess = await sessRes.json();
        if (!sessRes.ok) throw new Error(sess.error || `session HTTP ${sessRes.status}`);
        log(`[openai] session ok, model=${sess.model}`, 'ok');

        state.pc = new RTCPeerConnection();

        state.pc.ontrack = ({ streams, track }) => {
          log(`[openai] remote track: kind=${track.kind}, ready=${track.readyState}`, 'ok');
          if (state.audioEl) {
            state.audioEl.srcObject = streams[0];
            state.audioEl.volume = state.volume;
            const p = state.audioEl.play();
            if (p && p.catch) p.catch(e => log(`[openai] play err: ${e.message} — tap mic again`, 'err'));
          }
        };
        state.pc.onconnectionstatechange = () => {
          const cs = state.pc?.connectionState;
          log(`[openai] pc: ${cs}`);
          // Only kill on TRUE failures. 'disconnected' is transient (network blip)
          // and usually recovers on its own within ~1-2s — killing on it caused
          // mid-session drops on the Translation API which dips through 'disconnected'.
          if (cs === 'failed' || cs === 'closed') hardStop('pc:' + cs);
        };
        state.pc.oniceconnectionstatechange = () => log(`[openai] ice: ${state.pc?.iceConnectionState}`);

        state.dc = state.pc.createDataChannel('oai-events');
        state.dc.onopen = () => {
          log('[openai] data channel open', 'ok');
          $id('rtSrcStatus').textContent = 'live';
          state.sessionStartedAt = Date.now();
          state.stopDeadline = state.sessionStartedAt + BASE_LIFE_MS;
          armTimers();
          startSessionTimer();
          startStats();
          showTelegramStopButton();
        };
        state.dc.onmessage = (m) => {
          let evt; try { evt = JSON.parse(m.data); } catch { return; }
          state.eventCount++;
          const preview = evt.delta ? ` delta="${String(evt.delta).slice(0, 40)}"` : '';
          log(`[oa-evt] ${evt.type}${preview}`);
          switch (evt.type) {
            case 'session.input_transcript.delta':
            case 'conversation.item.input_audio_transcription.delta':
              if (typeof evt.delta === 'string') { state.srcInterim += evt.delta; renderSrc(); }
              break;
            case 'session.input_transcript.completed':
            case 'conversation.item.input_audio_transcription.completed':
              state.srcAccum += (state.srcInterim || '') + ' ';
              state.srcInterim = ''; renderSrc();
              break;
            case 'session.output_transcript.delta':
            case 'response.output_transcript.delta':
            case 'response.audio_transcript.delta':
              if (typeof evt.delta === 'string') { state.tgtAccum += evt.delta; renderTgt(); }
              break;
            case 'session.output_transcript.completed':
            case 'response.output_transcript.completed':
            case 'response.audio_transcript.done':
              state.tgtAccum += ' '; renderTgt();
              break;
            case 'error':
              log(`[oa-evt] ERROR: ${JSON.stringify(evt.error || evt)}`, 'err');
              break;
          }
        };

        for (const track of state.micStream.getAudioTracks()) {
          state.pc.addTrack(track, state.micStream);
        }
        const offer = await state.pc.createOffer();
        await state.pc.setLocalDescription(offer);
        const sdpRes = await fetch('https://api.openai.com/v1/realtime/translations/calls', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${sess.client_secret}`,
            'Content-Type': 'application/sdp',
          },
          body: offer.sdp,
        });
        const answerSdp = await sdpRes.text();
        if (!sdpRes.ok) throw new Error(`SDP ${sdpRes.status}: ${answerSdp}`);
        await state.pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
        log(`[openai] connected for target=${state.targetLang}`, 'ok');
      }

      function renderSrc() {
        const el = $id('rtSrcText'); if (!el) return;
        const txt = (state.srcAccum + (state.srcInterim || '')).trim();
        el.textContent = txt || '—';
      }
      function renderTgt() {
        const el = $id('rtTgtText'); if (!el) return;
        el.textContent = state.tgtAccum.trim() || '—';
      }

      // ---- timers ----
      function clearAllTimers() {
        if (warnTimer)    { clearTimeout(warnTimer);    warnTimer    = null; }
        if (stopTimer)    { clearTimeout(stopTimer);    stopTimer    = null; }
        if (sessionTimer) { clearInterval(sessionTimer); sessionTimer = null; }
        if (statsTimer)   { clearInterval(statsTimer);   statsTimer   = null; }
      }

      function armTimers() {
        if (warnTimer) { clearTimeout(warnTimer); warnTimer = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        const now = Date.now();
        const msToWarn = state.stopDeadline - WARN_LEAD_MS - now;
        const msToStop = state.stopDeadline - now;
        if (msToWarn > 0) {
          warnTimer = setTimeout(onWarn, msToWarn);
        } else {
          // Already past warn point — show button immediately.
          onWarn();
        }
        if (msToStop > 0) {
          stopTimer = setTimeout(onStop, msToStop);
        } else {
          onStop();
        }
      }

      function onWarn() {
        if (!state.running) return;
        playBeep(0.5);
        const row = $id('rtContinueRow');
        if (row) row.hidden = false;
        const left = Math.max(0, Math.floor((state.stopDeadline - Date.now()) / 1000));
        const lab = $id('rtWarnLeft'); if (lab) lab.textContent = String(left);
        log(`[guard] ⏰ ${left}s до автозупинки — натисни "Продовжити" щоб продовжити сесію`, 'err');
      }

      function onStop() {
        if (!state.running) return;
        log('[guard] auto-stop at deadline (cost guard)', 'err');
        hardStop('deadline');
      }

      function startSessionTimer() {
        if (sessionTimer) clearInterval(sessionTimer);
        const tick = () => {
          if (!state.running || !state.sessionStartedAt) return;
          const elapsed = Date.now() - state.sessionStartedAt;
          const leftToDeadline = Math.max(0, state.stopDeadline - Date.now());
          const elEl = $id('rtElapsed');
          const dlEl = $id('rtDeadlineLeft');
          if (elEl) elEl.textContent = mmss(elapsed);
          if (dlEl) dlEl.textContent = mmss(leftToDeadline);
          // Update warn-row countdown if visible.
          const row = $id('rtContinueRow');
          if (row && !row.hidden) {
            const lab = $id('rtWarnLeft');
            if (lab) lab.textContent = String(Math.ceil(leftToDeadline / 1000));
          }
          $id('rtSessionBar').hidden = false;
        };
        tick();
        sessionTimer = setInterval(tick, 500);
      }

      function startStats() {
        if (statsTimer) clearInterval(statsTimer);
        let prevOut = 0, prevIn = 0;
        statsTimer = setInterval(async () => {
          if (!state.pc || state.pc.connectionState !== 'connected') return;
          try {
            const stats = await state.pc.getStats();
            let outBytes = 0, inBytes = 0, outPackets = 0, inPackets = 0;
            stats.forEach(s => {
              if (s.type === 'outbound-rtp' && s.kind === 'audio') {
                outBytes = s.bytesSent || 0; outPackets = s.packetsSent || 0;
              }
              if (s.type === 'inbound-rtp' && s.kind === 'audio') {
                inBytes = s.bytesReceived || 0; inPackets = s.packetsReceived || 0;
              }
            });
            const dOut = outBytes - prevOut, dIn = inBytes - prevIn;
            log(`[stats] mic↑ ${dOut}B (${outPackets}p), audio↓ ${dIn}B (${inPackets}p)`);
            prevOut = outBytes; prevIn = inBytes;
          } catch {}
        }, 3000);
      }

      // ---- the cost-critical kill switch ----
      function hardStop(reason) {
        const wasRunning = state.running;
        state.running = false;

        // 1. Cancel timers.
        clearAllTimers();

        // 2. Tear down WebRTC synchronously.
        try { state.dc?.close(); } catch {}
        try { state.pc?.close(); } catch {}

        // 3. Stop mic tracks (re-prompts permission next time, but that's OK).
        try { state.micStream?.getTracks().forEach(t => t.stop()); } catch {}

        // 4. Detach audio sink.
        if (state.audioEl) { try { state.audioEl.pause(); state.audioEl.srcObject = null; } catch {} }

        // 5. Verify and log.
        const pcState = state.pc?.connectionState ?? 'null';
        const micState = state.micStream?.getAudioTracks()[0]?.readyState ?? 'null';
        log(`[guard] hardStop(${reason}): pc=${pcState}, mic=${micState}, events=${state.eventCount}`, wasRunning ? 'ok' : '');

        // 6. Null state. Keep audioEl reference (DOM node reused on next start).
        state.pc = null; state.dc = null; state.micStream = null;
        state.sessionStartedAt = 0; state.stopDeadline = 0;
        state.srcInterim = '';

        // 7. UI reset.
        $id('rtStartBtn')?.classList.remove('live');
        const sb = $id('rtSessionBar'); if (sb) sb.hidden = true;
        const cr = $id('rtContinueRow'); if (cr) cr.hidden = true;
        const ss = $id('rtSrcStatus'); if (ss) ss.textContent = 'idle';
        hideTelegramStopButton();
      }

      function stopIfRunning(reason = 'tab-switch') {
        if (state.running) hardStop(reason);
      }

      // ---- beep ----
      function playBeep(durationSec) {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          const ctx = new AC();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine'; osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + durationSec);
          osc.connect(gain).connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + durationSec + 0.05);
          osc.onended = () => { try { ctx.close(); } catch {} };
        } catch (e) { log(`[beep] failed: ${e.message}`, 'err'); }
      }

      // ---- Telegram MainButton — bonus reliability "STOP" rendered by the host app ----
      function showTelegramStopButton() {
        try {
          const wa = window.Telegram?.WebApp;
          if (!wa?.MainButton) return;
          const mb = wa.MainButton;
          mb.setText('🔴 STOP'); mb.color = '#E53935'; mb.textColor = '#FFFFFF';
          if (!mb._rtBound) { mb.onClick(() => hardStop('telegram-mainbutton')); mb._rtBound = true; }
          mb.show();
        } catch {}
      }
      function hideTelegramStopButton() {
        try { window.Telegram?.WebApp?.MainButton?.hide(); } catch {}
      }
    })();

    // ===================================================================
    // Chat Tab — OpenAI gpt-realtime (CONVERSATIONAL, NOT translate). The
    // model sits between two speakers (default prompt: ru/es bilingual
    // translator). Session config supports voice picker, custom system
    // instructions, room mode, VAD threshold, and a text input.
    //
    // Same 7-layer cost guard as RealtimeTab. Default deadline 3 min,
    // Continue +2 min on warn-window press.
    // ===================================================================
    window.ChatTab = (function() {
      const C_VOICE_LS  = 'chat.voice';
      const C_LANG_LS   = 'chat.lang';
      const C_TX_LS     = 'chat.transcribeModel';
      const C_DEV_LS    = 'chat.mic';
      // Bumped to .v5 to force-refresh anyone whose localStorage still holds
      // the previous default OR a self-edited UA↔EN — guaranteed UA↔ES default.
      const C_INSTR_LS  = 'chat.instructions.v5';
      const C_ROOM_LS   = 'chat.roomMode';
      const C_VAD_LS    = 'chat.vadThreshold';

      const WARN_LEAD_MS = 30 * 1000;
      const BASE_LIFE_MS = 3 * 60 * 1000;
      const EXTEND_MS    = 2 * 60 * 1000;

      const VOICES = ['marin', 'cedar', 'alloy', 'ash', 'ballad', 'coral', 'echo', 'sage', 'shimmer', 'verse'];
      const LANG_HINTS = [
        { code: '',   name: 'auto-detect' },
        { code: 'uk', name: 'Ukrainian' },
        { code: 'es', name: 'Spanish' },
        { code: 'en', name: 'English' },
        { code: 'ru', name: 'Russian' },
        { code: 'de', name: 'German' },
        { code: 'fr', name: 'French' },
        { code: 'it', name: 'Italian' },
        { code: 'pt', name: 'Portuguese' },
      ];
      const TX_MODELS = [
        { v: 'gpt-4o-transcribe',      label: 'gpt-4o-transcribe (accurate)' },
        { v: 'gpt-4o-mini-transcribe', label: 'gpt-4o-mini-transcribe (fast)' },
        { v: 'whisper-1',              label: 'whisper-1 (legacy)' },
      ];
      // Default prompt: clean 6-rule UA↔ES translator. The user is Ukrainian
      // and talks with Spanish speakers, so this is the practical default.
      const DEFAULT_INSTRUCTIONS = `You are a live voice translator between two speakers: one speaks Ukrainian, the other speaks Spanish. You are an invisible translation channel — nothing more.

Rules:
1. Wait for the speaker to finish their phrase before translating. Do not start mid-sentence.
2. If you hear Ukrainian → output Spanish. If you hear Spanish → output Ukrainian. Strictly.
3. Output ONLY the translation. No prefixes, no commentary, no acknowledgements, no questions.
4. Do not engage in conversation. You are a translator, not an assistant.
5. Preserve tone, register and emotion of the original.
6. If the audio is unclear or silent — stay silent.`;

      const state = {
        running: false,
        voice:        localStorage.getItem(C_VOICE_LS)  || 'marin',
        inputLang:    localStorage.getItem(C_LANG_LS)   || '',
        txModel:      localStorage.getItem(C_TX_LS)     || 'gpt-4o-transcribe',
        micDeviceId:  localStorage.getItem(C_DEV_LS)    || '',
        instructions: localStorage.getItem(C_INSTR_LS)  || DEFAULT_INSTRUCTIONS,
        roomMode:     localStorage.getItem(C_ROOM_LS)   === '1',
        vadThreshold: parseFloat(localStorage.getItem(C_VAD_LS) ?? '0.5') || 0.5,
        pc: null, dc: null, micStream: null, audioEl: null,
        sessionStartedAt: 0,
        stopDeadline: 0,
        eventCount: 0,
      };
      const messages = new Map(); // item_id → { role, body, text }
      let warnTimer = null, stopTimer = null, sessionTimer = null, statsTimer = null, watchdogTimer = null;

      const api = { _initialized: false, init, stopIfRunning };
      return api;

      function $id(id) { return document.getElementById(id); }
      function mmss(ms) { const s = Math.max(0, Math.floor(ms / 1000)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
      function log(msg, cls) {
        const el = $id('chLog'); if (!el) return;
        const line = document.createElement('div');
        line.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
        if (cls) line.classList.add(cls);
        el.appendChild(line); el.scrollTop = el.scrollHeight;
      }

      function init() {
        if (api._initialized) return;
        api._initialized = true;
        renderShell();
        bindControls();
        loadAudioDevices(false);
        // 5s grace window for visibilitychange (matches Realtime tab — same reasoning).
        let hiddenKillTimer = null;
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && state.running) {
            log('[guard] page hidden — 5s grace before auto-stop');
            hiddenKillTimer = setTimeout(() => {
              if (document.hidden && state.running) hardStop('hidden-5s');
            }, 5000);
          } else if (!document.hidden && hiddenKillTimer) {
            clearTimeout(hiddenKillTimer); hiddenKillTimer = null;
            log('[guard] visible again — kill cancelled', 'ok');
          }
        });
        window.addEventListener('pagehide', () => { if (state.running) hardStop('pagehide'); });
        window.addEventListener('beforeunload', () => { if (state.running) hardStop('unload'); });
        watchdogTimer = setInterval(() => {
          if (state.running) return;
          if (state.pc || state.micStream) {
            log('[watchdog] LEAK detected — forcing hardStop', 'err');
            hardStop('watchdog-leak');
          }
        }, 5000);
      }

      function renderShell() {
        const root = $id('chatTabRoot'); if (!root) return;
        const voiceOpts = VOICES.map(v => `<option value="${v}">${v}</option>`).join('');
        const langOpts = LANG_HINTS.map(l => `<option value="${l.code}">${l.name}${l.code ? ' (' + l.code + ')' : ''}</option>`).join('');
        const txOpts = TX_MODELS.map(m => `<option value="${m.v}">${m.label}</option>`).join('');
        root.innerHTML = `
          <div class="live-root">

            <div class="live-langs">
              <label style="font-size:12px;color:var(--text-secondary)">🗣 Voice:</label>
              <select id="chVoice">${voiceOpts}</select>
              <label style="font-size:12px;color:var(--text-secondary)">🌐 Input:</label>
              <select id="chLang">${langOpts}</select>
            </div>

            <div class="live-langs">
              <label style="font-size:12px;color:var(--text-secondary)">📝 Transcribe:</label>
              <select id="chTxModel" style="font-size:12px">${txOpts}</select>
            </div>

            <div class="live-card">
              <div class="label"><span>System prompt (instructions)</span><button id="chInstrReset" type="button" style="background:transparent;color:var(--text-secondary);border:1px solid var(--divider);border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer">↺ default</button></div>
              <textarea id="chInstr" rows="6" style="width:100%;background:#fff;color:var(--text-primary);border:1px solid var(--divider);border-radius:8px;padding:8px;font-family:inherit;font-size:12px;line-height:1.4;resize:vertical;min-height:80px"></textarea>
            </div>

            <div class="live-langs" style="gap:14px">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-secondary)">
                <input id="chRoom" type="checkbox"> 🔊 Room mode
              </label>
              <label style="font-size:12px;color:var(--text-secondary)">VAD:</label>
              <input id="chVad" type="range" min="0.1" max="0.9" step="0.05" style="width:100px;accent-color:var(--accent)">
              <span id="chVadVal" style="font-family:ui-monospace,monospace;font-weight:700;color:var(--accent);min-width:36px;font-size:12px">0.50</span>
            </div>

            <!-- LIVE indicator + deadline -->
            <div id="chSessionBar" hidden style="text-align:center;padding:8px 12px;margin-top:6px;background:rgba(229,57,53,0.10);border:1px solid rgba(229,57,53,0.30);border-radius:12px;font-family:ui-monospace,monospace;color:var(--recording);font-weight:700;letter-spacing:0.3px;font-size:13px">
              🔴 GPT-Realtime LIVE — <span id="chElapsed">0:00</span>
              <span style="color:var(--text-secondary);font-weight:500;font-size:11px"> / deadline <span id="chDeadlineLeft">3:00</span></span>
            </div>

            <div class="live-controls">
              <button class="live-start" id="chStartBtn" type="button" aria-label="Start / Stop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
            </div>

            <div class="live-controls" id="chContinueRow" hidden style="flex-direction:column;gap:8px;align-items:center">
              <div style="font-size:12px;color:var(--recording);font-weight:600">⏰ <span id="chWarnLeft">30</span>s до автозупинки (економія коштів)</div>
              <button class="swap-btn" id="chContinueBtn" type="button" style="padding:8px 18px;font-weight:700;background:var(--recording);color:#fff;border-color:var(--recording)">Продовжити ще +2 хв</button>
            </div>

            <div class="live-card">
              <div class="label"><span>Conversation</span><span id="chConnStatus">idle</span></div>
              <div id="chTranscript" style="display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding:4px"></div>
              <div style="display:flex;gap:8px;margin-top:10px">
                <input id="chTextInput" type="text" placeholder="…або напиши текстом і натисни Send (Enter)" disabled style="flex:1;background:#fff;color:var(--text-primary);border:1px solid var(--divider);border-radius:8px;padding:8px 10px;font-size:13px">
                <button id="chSendBtn" type="button" disabled class="swap-btn" style="padding:8px 16px;font-weight:600">Send</button>
              </div>
            </div>

            <div class="live-langs" style="font-size:12px;color:var(--text-secondary)">
              🎙
              <select id="chMic" style="background:#fff;color:var(--text-primary);border:1px solid var(--divider);border-radius:8px;padding:6px 8px;font-size:12px;max-width:220px"><option value="">Default</option></select>
              <button id="chRefreshMic" type="button" style="background:transparent;color:var(--text-secondary);border:1px solid var(--divider);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer">↻</button>
            </div>

            <div class="live-card">
              <div class="label">
                <span>Log</span>
                <button id="chCopyLog" type="button" style="background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;cursor:pointer">📋 Copy</button>
              </div>
              <div class="live-log" id="chLog"></div>
            </div>

            <audio id="chAudio" playsinline autoplay style="display:none"></audio>
          </div>
        `;
        $id('chVoice').value = state.voice;
        $id('chLang').value = state.inputLang;
        $id('chTxModel').value = state.txModel;
        $id('chInstr').value = state.instructions;
        $id('chRoom').checked = state.roomMode;
        $id('chVad').value = String(state.vadThreshold);
        $id('chVadVal').textContent = state.vadThreshold.toFixed(2);
      }

      function bindControls() {
        $id('chVoice').addEventListener('change', () => {
          state.voice = $id('chVoice').value;
          localStorage.setItem(C_VOICE_LS, state.voice);
        });
        $id('chLang').addEventListener('change', () => {
          state.inputLang = $id('chLang').value;
          localStorage.setItem(C_LANG_LS, state.inputLang);
        });
        $id('chTxModel').addEventListener('change', () => {
          state.txModel = $id('chTxModel').value;
          localStorage.setItem(C_TX_LS, state.txModel);
        });
        $id('chInstr').addEventListener('input', () => {
          state.instructions = $id('chInstr').value;
          localStorage.setItem(C_INSTR_LS, state.instructions);
        });
        $id('chInstrReset').addEventListener('click', () => {
          state.instructions = DEFAULT_INSTRUCTIONS;
          $id('chInstr').value = DEFAULT_INSTRUCTIONS;
          localStorage.setItem(C_INSTR_LS, DEFAULT_INSTRUCTIONS);
          log('[instr] reset to default');
        });
        $id('chRoom').addEventListener('change', () => {
          state.roomMode = $id('chRoom').checked;
          localStorage.setItem(C_ROOM_LS, state.roomMode ? '1' : '0');
        });
        $id('chVad').addEventListener('input', () => {
          state.vadThreshold = Number($id('chVad').value);
          $id('chVadVal').textContent = state.vadThreshold.toFixed(2);
          localStorage.setItem(C_VAD_LS, String(state.vadThreshold));
        });
        $id('chMic').addEventListener('change', () => {
          state.micDeviceId = $id('chMic').value || '';
          localStorage.setItem(C_DEV_LS, state.micDeviceId);
        });
        $id('chRefreshMic').addEventListener('click', () => loadAudioDevices(true));
        $id('chStartBtn').addEventListener('click', () => {
          if (state.running) hardStop('manual');
          else start().catch(e => { log(`[start] error: ${e.message}`, 'err'); hardStop('error:' + e.message); });
        });
        $id('chContinueBtn').addEventListener('click', () => {
          state.stopDeadline += EXTEND_MS;
          $id('chContinueRow').hidden = true;
          armTimers();
          log(`[continue] deadline extended → +2:00 (total ${mmss(state.stopDeadline - state.sessionStartedAt)})`, 'ok');
        });
        $id('chSendBtn').addEventListener('click', sendText);
        $id('chTextInput').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); sendText(); }
        });
        $id('chCopyLog').addEventListener('click', () => copyLogToClipboard($id('chCopyLog'), $id('chLog')));
      }

      async function loadAudioDevices(promptForPermission) {
        try {
          if (promptForPermission) {
            try {
              const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
              tmp.getTracks().forEach(t => t.stop());
            } catch (e) { log(`[mic] permission denied: ${e.message}`, 'err'); }
          }
          const devices = await navigator.mediaDevices.enumerateDevices();
          const inputs = devices.filter(d => d.kind === 'audioinput');
          const sel = $id('chMic');
          sel.innerHTML = '<option value="">Default</option>';
          for (const d of inputs) {
            const label = d.label || `Microphone ${d.deviceId.slice(0, 6)}`;
            sel.add(new Option(label, d.deviceId));
          }
          if (state.micDeviceId && inputs.some(d => d.deviceId === state.micDeviceId)) {
            sel.value = state.micDeviceId;
          } else { state.micDeviceId = ''; }
        } catch (e) { log(`[mic] enumerate failed: ${e.message}`, 'err'); }
      }

      // ---- transcript ----
      function renderMessage(id, role, text) {
        let entry = messages.get(id);
        if (!entry) {
          const el = document.createElement('div');
          el.style.cssText = `border-radius:10px;padding:10px 12px;line-height:1.4;font-size:14px;white-space:pre-wrap;word-break:break-word;${
            role === 'user'
              ? 'background:rgba(91,127,255,0.10);border:1px solid rgba(91,127,255,0.25)'
              : 'background:rgba(74,222,128,0.10);border:1px solid rgba(74,222,128,0.25)'
          }`;
          const who = document.createElement('div');
          who.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:4px';
          who.textContent = role === 'user' ? 'You' : 'Assistant';
          const body = document.createElement('div');
          el.appendChild(who); el.appendChild(body);
          $id('chTranscript').appendChild(el);
          entry = { role, el, body, text: '' };
          messages.set(id, entry);
        }
        entry.text = text;
        entry.body.textContent = text;
        const t = $id('chTranscript');
        t.scrollTop = t.scrollHeight;
      }
      function appendMessage(id, role, delta) {
        let entry = messages.get(id);
        if (!entry) { renderMessage(id, role, ''); entry = messages.get(id); }
        entry.text += delta;
        entry.body.textContent = entry.text;
        const t = $id('chTranscript');
        t.scrollTop = t.scrollHeight;
      }

      function sendText() {
        const inp = $id('chTextInput');
        const text = inp.value.trim();
        if (!text || !state.dc || state.dc.readyState !== 'open') return;
        try {
          state.dc.send(JSON.stringify({
            type: 'conversation.item.create',
            item: { type: 'message', role: 'user', content: [{ type: 'input_text', text }] },
          }));
          state.dc.send(JSON.stringify({ type: 'response.create' }));
          renderMessage(`local-${Date.now()}`, 'user', text);
          inp.value = '';
        } catch (e) { log(`[send] failed: ${e.message}`, 'err'); }
      }

      async function start() {
        if (state.running) return;
        $id('chTranscript').innerHTML = '';
        messages.clear();
        state.eventCount = 0;

        state.audioEl = $id('chAudio');
        if (state.audioEl) {
          state.audioEl.muted = false; state.audioEl.volume = 1.0;
          try { const p = state.audioEl.play(); if (p && p.catch) p.catch(() => {}); } catch {}
        }

        state.running = true;
        $id('chStartBtn').classList.add('live');
        $id('chConnStatus').textContent = 'connecting…';

        log(`[chat] requesting mic (room=${state.roomMode})…`);
        const baseAudio = state.roomMode
          ? { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
          : { echoCancellation: true,  noiseSuppression: true,  autoGainControl: true };
        const constraints = {
          audio: state.micDeviceId ? { deviceId: { exact: state.micDeviceId }, ...baseAudio } : baseAudio,
          video: false,
        };
        state.micStream = await navigator.mediaDevices.getUserMedia(constraints);
        const micTrack = state.micStream.getAudioTracks()[0];
        if (!micTrack) throw new Error('No mic audio track');
        log(`[chat] mic: ready=${micTrack.readyState}, label="${micTrack.label}"`, 'ok');

        log(`[chat] minting client_secret (voice=${state.voice})…`);
        const sessRes = await fetch('/api/realtime-chat/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            voice: state.voice,
            instructions: state.instructions,
            inputLanguage: state.inputLang,
            roomMode: state.roomMode,
            vadThreshold: state.vadThreshold,
            transcriptionModel: state.txModel,
          }),
        });
        const sess = await sessRes.json();
        if (!sessRes.ok) throw new Error(sess.error || `session HTTP ${sessRes.status}`);
        log(`[chat] session ok, model=${sess.model}`, 'ok');

        state.pc = new RTCPeerConnection();
        state.pc.ontrack = ({ streams, track }) => {
          log(`[chat] remote track: kind=${track.kind}`, 'ok');
          if (state.audioEl) {
            state.audioEl.srcObject = streams[0];
            const p = state.audioEl.play();
            if (p && p.catch) p.catch(e => log(`[chat] play err: ${e.message}`, 'err'));
          }
        };
        state.pc.onconnectionstatechange = () => {
          const cs = state.pc?.connectionState;
          log(`[chat] pc: ${cs}`);
          $id('chConnStatus').textContent = cs;
          // Only kill on TRUE failures. 'disconnected' is transient and usually
          // recovers — killing on it would cause premature mid-session drops.
          if (cs === 'failed' || cs === 'closed') hardStop('pc:' + cs);
        };
        state.pc.oniceconnectionstatechange = () => log(`[chat] ice: ${state.pc?.iceConnectionState}`);

        state.dc = state.pc.createDataChannel('oai-events');
        state.dc.onopen = () => {
          log('[chat] data channel open', 'ok');
          $id('chConnStatus').textContent = 'live';
          $id('chTextInput').disabled = false;
          $id('chSendBtn').disabled = false;
          state.sessionStartedAt = Date.now();
          state.stopDeadline = state.sessionStartedAt + BASE_LIFE_MS;
          armTimers();
          startSessionTimer();
          startStats();
          showTelegramStopButton();
        };
        state.dc.onmessage = handleEvent;

        for (const track of state.micStream.getAudioTracks()) {
          state.pc.addTrack(track, state.micStream);
        }
        const offer = await state.pc.createOffer();
        await state.pc.setLocalDescription(offer);
        const sdpRes = await fetch(`https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(sess.model)}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${sess.client_secret}`,
            'Content-Type': 'application/sdp',
          },
          body: offer.sdp,
        });
        const answerSdp = await sdpRes.text();
        if (!sdpRes.ok) throw new Error(`SDP ${sdpRes.status}: ${answerSdp}`);
        await state.pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
        log(`[chat] connected, model=${sess.model}`, 'ok');
      }

      function handleEvent(msg) {
        let evt; try { evt = JSON.parse(msg.data); } catch { return; }
        state.eventCount++;
        switch (evt.type) {
          case 'session.created':
          case 'session.updated':
            log(`[evt] ${evt.type}`);
            break;
          case 'conversation.item.input_audio_transcription.delta':
            if (evt.item_id && typeof evt.delta === 'string') appendMessage(evt.item_id, 'user', evt.delta);
            break;
          case 'conversation.item.input_audio_transcription.completed':
            if (evt.item_id && typeof evt.transcript === 'string') renderMessage(evt.item_id, 'user', evt.transcript);
            break;
          case 'response.audio_transcript.delta':
          case 'response.output_audio_transcript.delta':
            if (evt.item_id && typeof evt.delta === 'string') appendMessage(evt.item_id, 'assistant', evt.delta);
            break;
          case 'response.audio_transcript.done':
          case 'response.output_audio_transcript.done':
            if (evt.item_id && typeof evt.transcript === 'string') renderMessage(evt.item_id, 'assistant', evt.transcript);
            break;
          case 'response.text.delta':
          case 'response.output_text.delta':
            if (evt.item_id && typeof evt.delta === 'string') appendMessage(evt.item_id, 'assistant', evt.delta);
            break;
          case 'response.done':
            log('[evt] response.done');
            break;
          case 'error':
            log(`[evt] ERROR: ${JSON.stringify(evt.error || evt)}`, 'err');
            break;
        }
      }

      // ---- timers (same pattern as RealtimeTab) ----
      function clearAllTimers() {
        if (warnTimer)    { clearTimeout(warnTimer);    warnTimer    = null; }
        if (stopTimer)    { clearTimeout(stopTimer);    stopTimer    = null; }
        if (sessionTimer) { clearInterval(sessionTimer); sessionTimer = null; }
        if (statsTimer)   { clearInterval(statsTimer);   statsTimer   = null; }
      }
      function armTimers() {
        if (warnTimer) { clearTimeout(warnTimer); warnTimer = null; }
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        const now = Date.now();
        const msToWarn = state.stopDeadline - WARN_LEAD_MS - now;
        const msToStop = state.stopDeadline - now;
        if (msToWarn > 0) warnTimer = setTimeout(onWarn, msToWarn); else onWarn();
        if (msToStop > 0) stopTimer = setTimeout(onStop, msToStop); else onStop();
      }
      function onWarn() {
        if (!state.running) return;
        playBeep(0.5);
        const row = $id('chContinueRow'); if (row) row.hidden = false;
        const left = Math.max(0, Math.floor((state.stopDeadline - Date.now()) / 1000));
        const lab = $id('chWarnLeft'); if (lab) lab.textContent = String(left);
        log(`[guard] ⏰ ${left}s до автозупинки — натисни "Продовжити" щоб продовжити`, 'err');
      }
      function onStop() {
        if (!state.running) return;
        log('[guard] auto-stop at deadline (cost guard)', 'err');
        hardStop('deadline');
      }
      function startSessionTimer() {
        if (sessionTimer) clearInterval(sessionTimer);
        const tick = () => {
          if (!state.running || !state.sessionStartedAt) return;
          const elapsed = Date.now() - state.sessionStartedAt;
          const leftToDeadline = Math.max(0, state.stopDeadline - Date.now());
          const elEl = $id('chElapsed');     if (elEl) elEl.textContent = mmss(elapsed);
          const dlEl = $id('chDeadlineLeft'); if (dlEl) dlEl.textContent = mmss(leftToDeadline);
          const row = $id('chContinueRow');
          if (row && !row.hidden) {
            const lab = $id('chWarnLeft'); if (lab) lab.textContent = String(Math.ceil(leftToDeadline / 1000));
          }
          $id('chSessionBar').hidden = false;
        };
        tick();
        sessionTimer = setInterval(tick, 500);
      }
      function startStats() {
        if (statsTimer) clearInterval(statsTimer);
        let prevOut = 0, prevIn = 0;
        statsTimer = setInterval(async () => {
          if (!state.pc || state.pc.connectionState !== 'connected') return;
          try {
            const stats = await state.pc.getStats();
            let outBytes = 0, inBytes = 0, outPackets = 0, inPackets = 0;
            stats.forEach(s => {
              if (s.type === 'outbound-rtp' && s.kind === 'audio') {
                outBytes = s.bytesSent || 0; outPackets = s.packetsSent || 0;
              }
              if (s.type === 'inbound-rtp' && s.kind === 'audio') {
                inBytes = s.bytesReceived || 0; inPackets = s.packetsReceived || 0;
              }
            });
            const dOut = outBytes - prevOut, dIn = inBytes - prevIn;
            log(`[stats] mic↑ ${dOut}B (${outPackets}p), audio↓ ${dIn}B (${inPackets}p)`);
            prevOut = outBytes; prevIn = inBytes;
          } catch {}
        }, 3000);
      }

      function hardStop(reason) {
        const wasRunning = state.running;
        state.running = false;
        clearAllTimers();
        try { state.dc?.close(); } catch {}
        try { state.pc?.close(); } catch {}
        try { state.micStream?.getTracks().forEach(t => t.stop()); } catch {}
        if (state.audioEl) { try { state.audioEl.pause(); state.audioEl.srcObject = null; } catch {} }
        const pcState = state.pc?.connectionState ?? 'null';
        const micState = state.micStream?.getAudioTracks()[0]?.readyState ?? 'null';
        log(`[guard] hardStop(${reason}): pc=${pcState}, mic=${micState}, events=${state.eventCount}`, wasRunning ? 'ok' : '');
        state.pc = null; state.dc = null; state.micStream = null;
        state.sessionStartedAt = 0; state.stopDeadline = 0;
        $id('chStartBtn')?.classList.remove('live');
        const sb = $id('chSessionBar'); if (sb) sb.hidden = true;
        const cr = $id('chContinueRow'); if (cr) cr.hidden = true;
        const cs = $id('chConnStatus'); if (cs) cs.textContent = 'idle';
        const ti = $id('chTextInput'); if (ti) ti.disabled = true;
        const sb2 = $id('chSendBtn'); if (sb2) sb2.disabled = true;
        hideTelegramStopButton();
      }
      function stopIfRunning(reason = 'tab-switch') { if (state.running) hardStop(reason); }

      function playBeep(durationSec) {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          const ctx = new AC();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine'; osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + durationSec);
          osc.connect(gain).connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + durationSec + 0.05);
          osc.onended = () => { try { ctx.close(); } catch {} };
        } catch (e) { log(`[beep] failed: ${e.message}`, 'err'); }
      }

      function showTelegramStopButton() {
        try {
          const wa = window.Telegram?.WebApp;
          if (!wa?.MainButton) return;
          const mb = wa.MainButton;
          mb.setText('🔴 STOP'); mb.color = '#E53935'; mb.textColor = '#FFFFFF';
          if (!mb._chatBound) { mb.onClick(() => hardStop('telegram-mainbutton')); mb._chatBound = true; }
          mb.show();
        } catch {}
      }
      function hideTelegramStopButton() {
        try { window.Telegram?.WebApp?.MainButton?.hide(); } catch {}
      }
    })();
  </script>
</body>
