<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice Translator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #F5F0EB;
      --card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #8E8E93;
      --text-hint: #C4BEB6;
      --divider: #EDE8E2;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
      --recording: #E53935;
      --accent: var(--tg-theme-button-color, #5B7FFF);
      --radius-badge: 24px;
      --radius-card: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .app {
      max-width: 440px;
      margin: 0 auto;
      padding: 8px 20px 24px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== Title ===== */
    .app-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      padding: 8px 0 22px;
      letter-spacing: -0.3px;
    }

    /* ===== Language Selector ===== */
    .lang-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-bottom: 0;
    }

    .flag-badge {
      width: 92px;
      height: 92px;
      background: linear-gradient(145deg, #ffffff 0%, #f6f4f1 100%);
      border: none;
      border-radius: 26px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
      color: var(--badge-accent, #2f73da);
      --badge-accent: #2f73da;
      --badge-accent-soft: rgba(47, 115, 218, 0.2);
    }

    .flag-badge:active { transform: scale(0.93); }

    .flag-badge.primary-tone {
      --badge-accent: #2f73da;
      --badge-accent-soft: rgba(47, 115, 218, 0.2);
    }

    .flag-badge.secondary-tone {
      --badge-accent: #c54646;
      --badge-accent-soft: rgba(197, 70, 70, 0.2);
    }

    .flag-badge .flag-mic-icon {
      width: 52px;
      height: 52px;
      color: inherit;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 1px rgba(0, 0, 0, 0.06));
      pointer-events: none;
    }

    .flag-badge .flag-chip {
      position: absolute;
      right: 10px;
      bottom: 8px;
      min-width: 26px;
      height: 26px;
      padding: 0 5px;
      background: #ffffff;
      border: 1px solid rgba(26, 26, 26, 0.06);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
      pointer-events: none;
    }

    .flag-badge.recording {
      box-shadow: 0 0 0 3px var(--badge-accent), var(--shadow-md);
      animation: badge-pulse 1.5s ease-in-out infinite;
    }

    .flag-badge.dimmed {
      opacity: 0.4;
      transform: scale(0.95);
      cursor: default;
    }

    @keyframes badge-pulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--badge-accent), var(--shadow-md); }
      50% { box-shadow: 0 0 0 8px var(--badge-accent-soft), var(--shadow-md); }
    }

    /* ===== Content Card ===== */
    .content-card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      padding: 28px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 300px;
      margin-bottom: 20px;
      position: relative;
    }
    .content-card.result-layout .source-section,
    .content-card.result-layout .target-section {
      flex: 0 0 auto;
      min-height: 0;
      overflow-y: visible;
    }

    .source-section, .target-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 90px;
      overflow-y: auto;
    }

    .card-divider {
      height: 1px;
      background: var(--divider);
      margin: 18px 0;
      flex-shrink: 0;
      border: none;
      padding: 0;
      cursor: default;
      display: block;
      width: 100%;
    }
    .translate-btn-label { display: none; }
    .card-divider.translate-active {
      height: auto;
      background: var(--accent);
      border-radius: 12px;
      padding: 10px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-divider.translate-active:active {
      transform: scale(0.97);
      opacity: 0.85;
    }
    .card-divider.translate-active .translate-btn-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.2px;
    }

    .lang-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .text-display {
      flex: 1;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text-primary);
      word-break: break-word;
      letter-spacing: -0.3px;
      transition: font-size 0.15s ease;
    }

    .text-display .hint {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-hint);
      letter-spacing: 0;
    }

    .text-display .committed-text {
      color: var(--text-primary);
      font-weight: 600;
    }

    .text-display .partial-text {
      color: var(--text-secondary);
      font-weight: 400;
      font-style: italic;
    }

    /* Editable textarea (hidden by default, shown in result state) */
    .text-edit {
      display: none;
      flex: 0 0 auto;
      width: 100%;
      font-family: inherit;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--divider);
      border-radius: 0;
      outline: none;
      resize: none;
      padding: 0 0 4px 0;
      margin: 0;
      overflow-y: hidden;
      word-break: break-word;
      -webkit-user-select: text;
      user-select: text;
      min-height: 36px;
      transition: font-size 0.15s ease, border-color 0.2s ease;
      caret-color: var(--accent);
    }
    .text-edit::placeholder {
      color: var(--text-hint);
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0;
    }
    .text-edit:focus {
      border-bottom-color: var(--accent);
    }

    .text-display.processing {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0;
    }

    /* Action buttons row */
    .action-row {
      display: none;
      margin-top: 14px;
      text-align: right;
      flex-grow: 0;
      flex-shrink: 0;
    }

    .action-row.visible { display: block; }

    .action-btn {
      background: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 7px 14px;
      height: 32px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
      letter-spacing: 0.2px;
      margin-left: 8px;
      vertical-align: top;
    }

    .action-btn:active { transform: scale(0.95); }
    .action-btn svg { width: 13px; height: 13px; }

    .action-btn.loading {
      pointer-events: none;
      color: var(--accent);
    }

    .action-btn.loading .btn-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid var(--divider);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .action-btn.loading svg { display: none; }

    .action-btn.playing {
      color: var(--accent);
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--divider);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Waveform ===== */
    .wave-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    #waveform {
      width: 100%;
      height: 48px;
      display: block;
    }

    .record-btn {
      width: 94px;
      height: 94px;
      border-radius: 999px;
      border: none;
      background: #ffffff;
      color: #e06562;
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
      margin: 0 auto;
    }

    .record-btn svg {
      width: 40px;
      height: 40px;
      stroke: currentColor;
    }

    .record-btn:active {
      transform: scale(0.95);
    }

    .record-btn.active {
      color: #d44541;
      box-shadow: 0 0 0 5px rgba(212, 69, 65, 0.16), var(--shadow-md);
      animation: mic-pulse 1.1s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== Error Toast ===== */
    .error-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      padding: 11px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      max-width: 88%;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .error-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Tap Hint ===== */
    .tap-hint {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-hint);
      margin: 0;
      transition: opacity 0.25s ease;
    }

    .tap-hint.hidden { opacity: 0; }

    .tap-hint.cta {
      color: var(--recording);
      font-size: 14px;
      font-weight: 600;
      animation: hint-pulse 1.5s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .control-dock {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .control-dock .lang-selector {
      gap: 44px;
    }

    .flag-badge.lang-flag {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      background: #ffffff;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .flag-badge.lang-flag .flag-emoji {
      font-size: 34px;
      line-height: 1;
      pointer-events: none;
    }

    .flag-badge.lang-flag.recording {
      box-shadow: 0 0 0 3px var(--accent), var(--shadow-sm);
      animation: none;
    }

    .lang-role {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-hint);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* ===== Language Column (flag + label) ===== */
    .lang-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .lang-pick-btn {
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 8px;
      transition: background 0.2s;
      outline: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .lang-pick-btn:active { background: var(--divider); }

    .lang-pick-btn svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    /* ===== Bottom Sheet ===== */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lang-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 12px 20px calc(20px + env(safe-area-inset-bottom, 0));
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 201;
      max-height: 55vh;
      overflow-y: auto;
    }

    .lang-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--divider);
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      text-align: center;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }

    .lang-option:active { background: var(--bg); }

    .lang-option .opt-flag {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .lang-option .opt-names {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .lang-option .opt-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .lang-option .opt-name-uk {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .lang-option .opt-check {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      color: var(--accent);
      opacity: 0;
    }

    .lang-option .opt-check.active {
      opacity: 1;
    }

    /* ===== Loading (app init screen only) ===== */
    #loadingState.loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }

    #loadingState .spinner { width: 34px; height: 34px; border-width: 3px; }
    .loading-text { color: var(--text-hint); font-size: 15px; }

    /* Fade-in animation */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fade-in 0.35s ease-out; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Loading -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text">Завантаження...</div>
    </div>

    <!-- Main content -->
    <div id="mainContent" style="display:none">
      <div class="app-title">Voice Translator</div>

      <!-- Bottom sheet for language picker -->
      <div class="sheet-overlay" id="sheetOverlay" onclick="closeLangPicker()"></div>
      <div class="lang-sheet" id="langSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Оберіть мову</div>
        <div id="langList"></div>
      </div>

      <!-- Content Card -->
      <div class="content-card" id="contentCard">
        <div class="source-section" id="sourceSection">
          <div class="lang-name" id="sourceLang"></div>
          <div class="text-display" id="sourceText">
            <span class="hint">Натисніть на мікрофон і надиктуйте повідомлення або почніть писати</span>
          </div>
          <textarea class="text-edit" id="sourceEdit" rows="1" placeholder="Введіть текст..." spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
        </div>

        <button class="card-divider" id="translateBtn" type="button">
          <span class="translate-btn-label">Перекласти</span>
        </button>

        <div class="target-section" id="targetSection">
          <div class="lang-name" id="targetLang"></div>
          <div class="text-display" id="targetText"></div>
          <textarea class="text-edit" id="targetEdit" rows="1" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
          <div class="action-row" id="actionRow">
            <button class="action-btn" id="speakBtn" onclick="speakTranslation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
              <span id="speakLabel">Озвучити</span>
            </button>
            <button class="action-btn" id="copyBtn" onclick="copyTranslation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span id="copyLabel">Копіювати</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Waveform -->
      <div class="wave-section">
        <canvas id="waveform"></canvas>
      </div>

      <div class="control-dock">
        <button class="record-btn" id="recordBtn" type="button" onclick="handleMicClick()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="8" y="3" width="8" height="11" rx="4"></rect>
            <path d="M6.2 11.2v0.9a5.8 5.8 0 0 0 11.6 0v-0.9"></path>
            <line x1="12" y1="18" x2="12" y2="21"></line>
            <line x1="8.8" y1="21" x2="15.2" y2="21"></line>
          </svg>
        </button>

        <!-- Flag selector -->
        <div class="lang-selector">
          <div class="lang-col">
            <button class="flag-badge lang-flag" id="btnPrimary" onclick="openLangPicker('primary')">
              <span class="flag-emoji" id="primaryFlag"></span>
            </button>
            <button class="lang-pick-btn" id="pickPrimary" onclick="openLangPicker('primary')">
              <span id="primaryLabel"></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="lang-role">Звідки</div>
          </div>

          <div class="lang-col">
            <button class="flag-badge lang-flag" id="btnSecondary" onclick="openLangPicker('secondary')">
              <span class="flag-emoji" id="secondaryFlag"></span>
            </button>
            <button class="lang-pick-btn" id="pickSecondary" onclick="openLangPicker('secondary')">
              <span id="secondaryLabel"></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="lang-role">Куди</div>
          </div>
        </div>

        <!-- Tap hint -->
        <div class="tap-hint" id="tapHint">Натисніть на мікрофон і надиктуйте повідомлення або почніть писати</div>
      </div>
    </div>

    <div class="error-toast" id="errorToast"></div>
  </div>

  <script>
    // ===== Telegram WebApp =====
    const WebApp = window.Telegram.WebApp;
    WebApp.ready();
    WebApp.expand();
    WebApp.setHeaderColor('#F5F0EB');
    WebApp.setBackgroundColor('#F5F0EB');

    const telegramId = WebApp.initDataUnsafe?.user?.id;

    // ===== Debug logging to server =====
    let _debugQueue = [];
    let _debugTimer = null;
    function debugLog(tag, data) {
      _debugQueue.push({ tag, data, t: Date.now() });
      if (!_debugTimer) {
        _debugTimer = setTimeout(() => {
          const batch = _debugQueue;
          _debugQueue = [];
          _debugTimer = null;
          fetch('/api/debug', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag, data: batch.length === 1 ? batch[0].data : batch })
          }).catch(() => {});
        }, 300);
      }
    }

    // ===== Soniox sliding window merge =====
    function mergeWithWindow(accumulated, incoming) {
      if (!accumulated) return incoming;
      if (incoming.startsWith(accumulated)) return incoming;

      const trimmed = incoming.trimStart();
      if (!trimmed) return accumulated;

      // Method 1: suffix-prefix overlap
      // Find longest suffix of accumulated that equals prefix of incoming
      const maxOverlap = Math.min(accumulated.length, trimmed.length);
      for (let len = maxOverlap; len >= 3; len--) {
        if (trimmed.startsWith(accumulated.slice(-len))) {
          return accumulated.slice(0, -len) + trimmed;
        }
      }

      // Method 2: find incoming's start within accumulated (handles corrections)
      for (const needleLen of [15, 10, 6]) {
        if (trimmed.length < needleLen) continue;
        const needle = trimmed.slice(0, needleLen);
        const idx = accumulated.lastIndexOf(needle);
        if (idx >= 0) {
          return accumulated.slice(0, idx) + trimmed;
        }
      }

      // If incoming is already within accumulated, nothing new
      if (accumulated.includes(trimmed)) return accumulated;

      // Last resort: append new text
      return accumulated + ' ' + trimmed;
    }

    // ===== ElevenLabs lang map =====
    const LANG_MAP = { uk: 'ukr', en: 'eng', es: 'spa', ka: 'kat', id: 'ind', ru: 'rus', hu: 'hun' };

    // ===== Soniox Client (lazy-loaded) =====
    let sonioxClient = null;
    async function getSonioxClient() {
      if (!sonioxClient) {
        const { SonioxClient } = await import('https://unpkg.com/@soniox/speech-to-text-web?module');
        sonioxClient = new SonioxClient({
          apiKey: async () => {
            const res = await fetch('/api/token');
            if (!res.ok) throw new Error('Не вдалося отримати токен');
            const { token } = await res.json();
            return token;
          }
        });
      }
      return sonioxClient;
    }

    // ===== State =====
    let sttProvider = 'soniox'; // set from server config
    let state = 'idle';
    let userConfig = null;
    let currentSource = null; // language code of source
    let currentTarget = null; // language code of target
    let finalText = '';
    let partialText = '';
    let sttAccumulated = '';  // full accumulated text (merges Soniox sliding window)
    const LIVE_TRANSLATE_CHUNK_WORDS = 1;
    const LIVE_TRANSLATE_DEBOUNCE_MS = 350;
    const LIVE_TRANSLATE_MIN_INTERVAL_MS = 500;
    const LIVE_TRANSLATE_MIN_CHARS = 1;

    const liveTranslation = {
      sessionId: 0,
      debounceTimer: null,
      inFlight: false,
      inFlightSessionId: 0,
      queuedText: '',
      queuedForce: false,
      queuedSessionId: 0,
      lastRequestAt: 0,
      lastRequestedText: '',
      lastTranslatedText: '',
      lastTranslation: '',
      lastWordCheckpoint: 0
    };
    let sttSessionId = 0;

    // Audio / WebSocket
    let mediaStream = null;
    let audioContext = null;
    let sourceNode = null;
    let analyserNode = null;
    let processorNode = null;
    let ws = null;
    let animationId = null;

    // Canvas
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    let dataArray = null;

    // DOM
    const $loading = document.getElementById('loadingState');
    const $main = document.getElementById('mainContent');
    const $btnPrimary = document.getElementById('btnPrimary');
    const $btnSecondary = document.getElementById('btnSecondary');
    const $primaryFlag = document.getElementById('primaryFlag');
    const $secondaryFlag = document.getElementById('secondaryFlag');
    const $sourceLang = document.getElementById('sourceLang');
    const $sourceText = document.getElementById('sourceText');
    const $targetLang = document.getElementById('targetLang');
    const $targetText = document.getElementById('targetText');
    const $actionRow = document.getElementById('actionRow');
    const $speakBtn = document.getElementById('speakBtn');
    const $speakLabel = document.getElementById('speakLabel');
    const $copyBtn = document.getElementById('copyBtn');
    const $copyLabel = document.getElementById('copyLabel');
    const $recordBtn = document.getElementById('recordBtn');
    const $errorToast = document.getElementById('errorToast');
    const $primaryLabel = document.getElementById('primaryLabel');
    const $secondaryLabel = document.getElementById('secondaryLabel');
    const $tapHint = document.getElementById('tapHint');
    const $sheetOverlay = document.getElementById('sheetOverlay');
    const $langSheet = document.getElementById('langSheet');
    const $langList = document.getElementById('langList');
    const $contentCard = document.getElementById('contentCard');
    const $sourceSection = document.getElementById('sourceSection');
    const $targetSection = document.getElementById('targetSection');
    const $sourceEdit = document.getElementById('sourceEdit');
    const $targetEdit = document.getElementById('targetEdit');
    const $translateBtn = document.getElementById('translateBtn');

    // TTS state
    let ttsAudio = null;
    let ttsPlaying = false;
    let ttsCachedText = null;
    let lastTranslatedSourceText = '';

    function clearSpeakSpinner() {
      const sp = $speakBtn.querySelector('.btn-spinner');
      if (sp) sp.remove();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function beginSttSession() {
      sttSessionId += 1;
      return sttSessionId;
    }

    function invalidateSttSession() {
      sttSessionId += 1;
    }

    function isCurrentSttSession(sessionId) {
      return sessionId === sttSessionId;
    }

    function setCurrentDirection(sourceLanguage, targetLanguage) {
      currentSource = sourceLanguage;
      currentTarget = targetLanguage;
      renderUI();
    }

    function resetTranscriptForNewSpeaker() {
      finalText = '';
      partialText = '';
      sttAccumulated = '';
      lastTranslatedSourceText = '';
      $sourceEdit.value = '';
      $targetEdit.value = '';
      updateTranslateBtnVisibility();
      startLiveTranslationSession();
    }

    async function stopActiveRecognition() {
      invalidateSttSession();
      if (sttProvider === 'soniox' && sonioxClient) {
        const clientRef = sonioxClient;
        let timedOut = false;
        try {
          await Promise.race([
            clientRef.stop().catch(() => {}),
            sleep(700).then(() => { timedOut = true; })
          ]);
        } catch (e) {}
        if (timedOut && sonioxClient === clientRef) {
          // Drop stale client to avoid stop/start race side-effects.
          sonioxClient = null;
        }
      }
      cleanup();
    }

    function countWords(text) {
      const normalized = (text || '').trim();
      if (!normalized) return 0;
      return normalized.split(/\s+/).length;
    }

    function getTranscriptText() {
      return (finalText + (partialText ? ' ' + partialText : '')).trim();
    }

    function startLiveTranslationSession() {
      liveTranslation.sessionId += 1;
      if (liveTranslation.debounceTimer) {
        clearTimeout(liveTranslation.debounceTimer);
        liveTranslation.debounceTimer = null;
      }
      liveTranslation.queuedText = '';
      liveTranslation.queuedForce = false;
      liveTranslation.queuedSessionId = liveTranslation.sessionId;
      liveTranslation.lastRequestAt = 0;
      liveTranslation.lastRequestedText = '';
      liveTranslation.lastTranslatedText = '';
      liveTranslation.lastTranslation = '';
      liveTranslation.lastWordCheckpoint = 0;
    }

    function renderLivePlaceholder() {
      $targetText.textContent = '';
      $targetText.className = 'text-display';
    }

    function renderLiveTranslationPending() {
      if (state !== 'recording') return;
      if (liveTranslation.lastTranslation) return;
      $targetText.innerHTML = '<div class="processing"><div class="spinner"></div>Перекладаю наживо...</div>';
      $targetText.className = 'text-display';
    }

    function renderLiveTranslation(translation) {
      if (!translation) return;
      $targetText.textContent = translation;
      $targetText.className = 'text-display';
      adaptFontSize($targetText, translation);
    }

    function applyDetectedDirection(detectedLanguage, targetLanguage) {
      if (!detectedLanguage || !targetLanguage) return;
      if (detectedLanguage === currentSource && targetLanguage === currentTarget) return;
      setCurrentDirection(detectedLanguage, targetLanguage);
    }

    async function translateRequest(text) {
      const res = await fetch('/api/translate-auto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          primaryLanguage: userConfig.primaryLanguage,
          secondaryLanguage: userConfig.secondaryLanguage
        })
      });
      if (!res.ok) throw new Error('Помилка перекладу');
      const data = await res.json();
      applyDetectedDirection(data.detectedLanguage, data.targetLanguage);
      return data;
    }

    async function drainLiveTranslationQueue() {
      if (liveTranslation.inFlight || !liveTranslation.queuedText) return;

      const text = liveTranslation.queuedText;
      const force = liveTranslation.queuedForce;
      const sessionId = liveTranslation.queuedSessionId;

      if (sessionId !== liveTranslation.sessionId) {
        liveTranslation.queuedText = '';
        liveTranslation.queuedForce = false;
        return;
      }

      const elapsed = Date.now() - liveTranslation.lastRequestAt;
      if (!force && elapsed < LIVE_TRANSLATE_MIN_INTERVAL_MS) {
        if (!liveTranslation.debounceTimer) {
          liveTranslation.debounceTimer = setTimeout(() => {
            liveTranslation.debounceTimer = null;
            void drainLiveTranslationQueue();
          }, LIVE_TRANSLATE_MIN_INTERVAL_MS - elapsed);
        }
        return;
      }

      liveTranslation.queuedText = '';
      liveTranslation.queuedForce = false;
      liveTranslation.inFlight = true;
      liveTranslation.inFlightSessionId = sessionId;
      liveTranslation.lastRequestAt = Date.now();
      liveTranslation.lastRequestedText = text;

      renderLiveTranslationPending();

      try {
        const data = await translateRequest(text);
        const translation = data.translation;

        if (sessionId !== liveTranslation.sessionId) return;

        liveTranslation.lastTranslatedText = text;
        liveTranslation.lastTranslation = translation;
        liveTranslation.lastWordCheckpoint = countWords(text);

        if (state === 'recording') {
          renderLiveTranslation(translation);
        }
      } catch (error) {
        if (sessionId === liveTranslation.sessionId && force) {
          showError(error.message || 'Помилка перекладу');
        }
      } finally {
        liveTranslation.inFlight = false;
        liveTranslation.inFlightSessionId = 0;
        if (liveTranslation.queuedText) {
          void drainLiveTranslationQueue();
        }
      }
    }

    function queueLiveTranslation(text, { force = false, sessionId = liveTranslation.sessionId } = {}) {
      const normalized = (text || '').trim();
      if (!normalized) return;
      if (sessionId !== liveTranslation.sessionId) return;
      if (!force && normalized === liveTranslation.lastRequestedText) return;

      liveTranslation.queuedText = normalized;
      liveTranslation.queuedForce = liveTranslation.queuedForce || force;
      liveTranslation.queuedSessionId = sessionId;

      if (force) {
        if (liveTranslation.debounceTimer) {
          clearTimeout(liveTranslation.debounceTimer);
          liveTranslation.debounceTimer = null;
        }
        void drainLiveTranslationQueue();
        return;
      }

      if (!liveTranslation.debounceTimer) {
        liveTranslation.debounceTimer = setTimeout(() => {
          liveTranslation.debounceTimer = null;
          void drainLiveTranslationQueue();
        }, LIVE_TRANSLATE_DEBOUNCE_MS);
      }
    }

    function maybeQueueLiveTranslation() {
      if (state !== 'recording') return;

      const text = getTranscriptText();
      if (!text || text.length < LIVE_TRANSLATE_MIN_CHARS) return;

      const words = countWords(text);
      if (words < LIVE_TRANSLATE_CHUNK_WORDS) return;

      const wordsDelta = words - liveTranslation.lastWordCheckpoint;
      const charsDelta = Math.max(0, text.length - liveTranslation.lastRequestedText.length);
      const shortened = liveTranslation.lastRequestedText && text.length + 8 < liveTranslation.lastRequestedText.length;

      if (shortened || wordsDelta >= LIVE_TRANSLATE_CHUNK_WORDS || charsDelta >= 3) {
        queueLiveTranslation(text);
      }
    }

    async function waitForLiveQueueToDrain(sessionId, timeoutMs = 12000) {
      const startedAt = Date.now();

      while (Date.now() - startedAt < timeoutMs) {
        const hasQueued = liveTranslation.queuedText && liveTranslation.queuedSessionId === sessionId;
        const inFlight = liveTranslation.inFlight && liveTranslation.inFlightSessionId === sessionId;
        if (!hasQueued && !inFlight) return;
        await new Promise(resolve => setTimeout(resolve, 60));
      }
    }

    async function ensureFinalLiveTranslation(text) {
      const normalized = (text || '').trim();
      if (!normalized) return '';

      const sessionId = liveTranslation.sessionId;
      if (
        liveTranslation.lastTranslatedText === normalized &&
        liveTranslation.lastTranslation
      ) {
        return liveTranslation.lastTranslation;
      }

      queueLiveTranslation(normalized, { force: true, sessionId });
      await waitForLiveQueueToDrain(sessionId);

      if (
        liveTranslation.lastTranslatedText === normalized &&
        liveTranslation.lastTranslation
      ) {
        return liveTranslation.lastTranslation;
      }

      const fallbackData = await translateRequest(normalized);
      const fallback = fallbackData.translation;
      if (sessionId === liveTranslation.sessionId) {
        liveTranslation.lastTranslatedText = normalized;
        liveTranslation.lastTranslation = fallback;
        liveTranslation.lastWordCheckpoint = countWords(normalized);
      }
      return fallback;
    }

    // ===== Init =====
    async function init() {
      if (!telegramId) {
        showError('Відкрийте через Telegram бот');
        $loading.style.display = 'none';
        $main.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`/api/user/${telegramId}`);
        if (!res.ok) throw new Error(res.status === 404
          ? 'Спершу запустіть /start в боті'
          : 'Помилка завантаження');
        userConfig = await res.json();
        sttProvider = userConfig.sttProvider || 'soniox';

        currentSource = userConfig.primaryLanguage;
        currentTarget = userConfig.secondaryLanguage;

        renderUI();
        $loading.style.display = 'none';
        $main.style.display = 'block';
        resizeCanvas();
        drawWaveform();

        // Pre-load Soniox SDK so first recording starts instantly
        if (sttProvider === 'soniox') getSonioxClient().catch(() => {});
      } catch (err) {
        showError(err.message);
        $loading.style.display = 'none';
        $main.style.display = 'block';
      }
    }

    function renderUI() {
      const src = userConfig.languages[currentSource];
      const tgt = userConfig.languages[currentTarget];
      $primaryFlag.textContent = src.flag;
      $secondaryFlag.textContent = tgt.flag;
      $primaryLabel.textContent = src.nameUk;
      $secondaryLabel.textContent = tgt.nameUk;
      $sourceLang.textContent = src.nameUk;
      $targetLang.textContent = tgt.nameUk;
    }

    // ===== Language Picker =====
    let pickerTarget = null; // 'primary' | 'secondary'

    function openLangPicker(which) {
      if (state === 'recording' || state === 'processing') return;
      pickerTarget = which;

      const currentCode = which === 'primary' ? currentSource : currentTarget;
      const allLangs = userConfig.languages;

      $langList.innerHTML = Object.entries(allLangs).map(([code, lang]) => `
        <div class="lang-option" onclick="selectLanguage('${code}')">
          <span class="opt-flag">${lang.flag}</span>
          <div class="opt-names">
            <span class="opt-name">${lang.name}</span>
            <span class="opt-name-uk">${lang.nameUk}</span>
          </div>
          <svg class="opt-check ${code === currentCode ? 'active' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      `).join('');

      $sheetOverlay.classList.add('open');
      $langSheet.classList.add('open');
    }

    function selectLanguage(code) {
      if (!pickerTarget) return;

      let nextSource = currentSource;
      let nextTarget = currentTarget;

      if (pickerTarget === 'primary') {
        if (code === currentTarget) {
          nextSource = currentTarget;
          nextTarget = currentSource;
        } else {
          nextSource = code;
        }
      } else {
        if (code === currentSource) {
          nextTarget = currentSource;
          nextSource = currentTarget;
        } else {
          nextTarget = code;
        }
      }

      if (nextSource === nextTarget) return;

      currentSource = nextSource;
      currentTarget = nextTarget;
      userConfig.primaryLanguage = currentSource;
      userConfig.secondaryLanguage = currentTarget;

      renderUI();
      closeLangPicker();

      // Save to server
      if (telegramId) {
        fetch(`/api/user/${telegramId}/languages`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            primaryLanguage: userConfig.primaryLanguage,
            secondaryLanguage: userConfig.secondaryLanguage
          })
        }).catch(() => showError('Не вдалося зберегти мову'));
      }
    }

    function closeLangPicker() {
      $sheetOverlay.classList.remove('open');
      $langSheet.classList.remove('open');
      pickerTarget = null;
    }

    // ===== Canvas =====
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = 48 * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = '48px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      if (state !== 'recording') drawWaveform();
    });

    async function beginRecordingAuto() {
      await stopActiveRecognition();
      resetTranscriptForNewSpeaker();
      if (!currentSource || !currentTarget || currentSource === currentTarget) {
        setCurrentDirection(userConfig.primaryLanguage, userConfig.secondaryLanguage);
      } else {
        renderUI();
      }
      $actionRow.classList.remove('visible');
      setState('recording');

      try {
        if (sttProvider === 'soniox') {
          await startRecordingSoniox();
        } else {
          await startRecordingElevenLabs();
        }
      } catch (err) {
        showError(err.name === 'NotAllowedError'
          ? 'Дозвольте доступ до мікрофона'
          : (err.message || 'Виникла помилка'));
        await stopActiveRecognition();
        setState('idle');
      }
    }

    // ===== Mic click =====
    async function handleMicClick() {
      if (state === 'processing') return;

      // Stop any playing TTS
      if (ttsAudio) { ttsAudio.pause(); ttsPlaying = false; }
      ttsCachedText = null;

      if (state === 'recording') {
        await stopRecording();
        return;
      }

      await beginRecordingAuto();
    }

    // ===== Soniox recording =====
    async function startRecordingSoniox() {
      const sessionId = beginSttSession();
      const hasActiveStream = mediaStream && mediaStream.getAudioTracks().some(track => track.readyState === 'live');
      if (!hasActiveStream) {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }

      if (!audioContext || audioContext.state === 'closed' || !sourceNode || !analyserNode) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 2048;
        dataArray = new Uint8Array(analyserNode.frequencyBinCount);
        sourceNode.connect(analyserNode);
      }
      drawWaveform();

      const client = await getSonioxClient();
      client.start({
        model: 'stt-rt-v4',
        stream: mediaStream,
        languageHints: [userConfig.primaryLanguage, userConfig.secondaryLanguage],
        onPartialResult(result) {
          if (!isCurrentSttSession(sessionId)) return;
          // Soniox RT returns a sliding window — all tokens are partial
          // We must merge windows to accumulate the full text
          let windowText = '';
          for (const token of result.tokens) {
            windowText += token.text;
          }

          if (!windowText) return;

          const prevLen = sttAccumulated.length;
          sttAccumulated = mergeWithWindow(sttAccumulated, windowText);
          finalText = sttAccumulated;
          partialText = '';

          if (sttAccumulated.length !== prevLen) {
            debugLog('STT', {
              window: windowText.slice(-50),
              accumulated: sttAccumulated.slice(-80),
              accLen: sttAccumulated.length
            });
          }

          updateTranscript();
        },
        onError(status, message) {
          if (!isCurrentSttSession(sessionId)) return;
          showError('Помилка розпізнавання');
          cleanup();
          setState('idle');
        }
      });
    }

    // ===== ElevenLabs recording =====
    async function startRecordingElevenLabs() {
      const sessionId = beginSttSession();
      const tokenRes = await fetch('/api/token');
      if (!tokenRes.ok) throw new Error('Не вдалося отримати токен');
      const { token } = await tokenRes.json();

      const langCode = currentSource || userConfig.primaryLanguage;
      const isoCode = LANG_MAP[langCode] || langCode;

      const wsUrl = `wss://api.elevenlabs.io/v1/speech-to-text/realtime?model_id=scribe_v2_realtime&language_code=${isoCode}&token=${token}`;
      ws = new WebSocket(wsUrl);

      ws.onopen = async () => {
        if (!isCurrentSttSession(sessionId)) return;
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (micErr) {
          if (!isCurrentSttSession(sessionId)) return;
          showError('Дозвольте доступ до мікрофона');
          cleanup();
          setState('idle');
          return;
        }

        let targetRate = 16000;
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        } catch (e) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        const actualRate = audioContext.sampleRate;

        sourceNode = audioContext.createMediaStreamSource(mediaStream);

        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 2048;
        dataArray = new Uint8Array(analyserNode.frequencyBinCount);
        sourceNode.connect(analyserNode);

        processorNode = audioContext.createScriptProcessor(4096, 1, 1);
        processorNode.onaudioprocess = (e) => {
          if (!isCurrentSttSession(sessionId)) return;
          if (state !== 'recording' || !ws || ws.readyState !== WebSocket.OPEN) return;

          let inputData = e.inputBuffer.getChannelData(0);
          if (actualRate !== targetRate) {
            inputData = downsample(inputData, actualRate, targetRate);
          }

          const int16 = floatTo16BitPCM(inputData);
          const base64 = arrayBufferToBase64(int16.buffer);

          ws.send(JSON.stringify({
            message_type: 'input_audio_chunk',
            audio_base_64: base64,
            sample_rate: targetRate
          }));
        };

        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);
        drawWaveform();
      };

      ws.onmessage = (event) => {
        if (!isCurrentSttSession(sessionId)) return;
        const msg = JSON.parse(event.data);
        const msgType = msg.type || msg.message_type;

        if (msgType === 'partial_transcript') {
          partialText = msg.text || '';
          updateTranscript();
        }
        if (msgType === 'committed_transcript') {
          const t = msg.text || '';
          if (t) {
            finalText += (finalText ? ' ' : '') + t;
            partialText = '';
            updateTranscript();
          }
        }
      };

      ws.onerror = () => {
        if (!isCurrentSttSession(sessionId)) return;
        showError('Помилка з\'єднання');
        cleanup();
        setState('idle');
      };

      ws.onclose = () => {};
    }

    // ===== Stop recording =====
    async function stopRecording() {
      invalidateSttSession();
      if (sttProvider === 'soniox' && sonioxClient) {
        try { await sonioxClient.stop(); } catch(e) {}
      }
      cleanup();

      const text = getTranscriptText();

      if (!text) {
        setState('idle');
        $sourceText.innerHTML = '<span class="hint">Не вдалося розпізнати. Спробуйте ще.</span>';
        return;
      }

      finalText = text;
      partialText = '';
      setState('processing');

      try {
        const translation = await ensureFinalLiveTranslation(text);
        showResult(text, translation);
        setState('result');
      } catch (err) {
        showError(err.message || 'Помилка перекладу');
        setState('idle');
      }
    }

    // ===== Cleanup =====
    function cleanup() {
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (processorNode) { processorNode.disconnect(); processorNode = null; }
      if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
      if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
      if (audioContext && audioContext.state !== 'closed') { audioContext.close().catch(() => {}); audioContext = null; }
      if (ws && ws.readyState === WebSocket.OPEN) { ws.close(); }
      ws = null;
      if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    }

    // ===== State =====
    function setState(newState) {
      state = newState;

      // Reset edit mode (skip for result — showResult() handles textarea display)
      if (newState !== 'result') {
        $sourceText.style.display = '';
        $targetText.style.display = '';
        $sourceEdit.style.display = 'none';
        $targetEdit.style.display = 'none';
        $translateBtn.classList.remove('translate-active');
        $contentCard.classList.remove('result-layout');
      }

      $btnPrimary.classList.remove('recording', 'dimmed');
      $btnSecondary.classList.remove('recording', 'dimmed');
      $recordBtn.classList.remove('active');

      // Update tap hint per state
      $tapHint.classList.remove('cta');
      if (newState === 'idle') {
        $tapHint.textContent = 'Натисніть на мікрофон і надиктуйте повідомлення або почніть писати';
        $tapHint.classList.remove('hidden');
      } else if (newState === 'recording') {
        $tapHint.textContent = 'Натисніть мікрофон, щоб завершити диктування';
        $tapHint.classList.remove('hidden');
        $tapHint.classList.add('cta');
      } else {
        $tapHint.classList.add('hidden');
      }

      switch (newState) {
        case 'idle':
          $sourceText.innerHTML = '<span class="hint">Натисніть на мікрофон і надиктуйте повідомлення або почніть писати</span>';
          $targetText.textContent = '';
          $actionRow.classList.remove('visible');
          drawWaveform();
          break;

        case 'recording':
          $recordBtn.classList.add('active');
          $btnPrimary.classList.add('recording');
          $sourceText.innerHTML = '<span class="partial-text">Слухаю...</span>';
          renderLivePlaceholder();
          $actionRow.classList.remove('visible');
          break;

        case 'processing':
          $sourceText.textContent = finalText;
          $sourceText.className = 'text-display';
          $targetText.innerHTML = '<div class="processing"><div class="spinner"></div>Перекладаю...</div>';
          $targetText.className = 'text-display';
          $actionRow.classList.remove('visible');
          drawWaveform();
          break;

        case 'result':
          drawWaveform();
          break;
      }
    }

    // ===== Adaptive font sizing =====
    function adaptFontSize(el, text) {
      const len = text.length;
      let size;
      if (len < 30) size = 28;
      else if (len < 60) size = 24;
      else if (len < 120) size = 20;
      else if (len < 200) size = 17;
      else size = 15;
      el.style.fontSize = size + 'px';
    }

    function autoResizeTextarea(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    function getTargetText() {
      return $targetEdit.style.display === 'block'
        ? $targetEdit.value.trim()
        : $targetText.textContent.trim();
    }

    function updateTranslateBtnVisibility() {
      const text = $sourceEdit.value.trim();
      const hasManualChanges = text && text !== lastTranslatedSourceText;
      const isEditingSource = $sourceEdit.style.display === 'block';
      $translateBtn.classList.toggle('translate-active', Boolean(isEditingSource && hasManualChanges));
    }

    // ===== Transcript =====
    function updateTranscript() {
      let html = '';
      if (finalText) html += '<span class="committed-text">' + escapeHtml(finalText) + '</span>';
      if (partialText) html += ' <span class="partial-text">' + escapeHtml(partialText) + '</span>';
      if (!html) html = '<span class="partial-text">Слухаю...</span>';
      $sourceText.innerHTML = html;
      $sourceText.className = 'text-display';

      // Adaptive font size
      const fullText = (finalText + ' ' + partialText).trim();
      adaptFontSize($sourceText, fullText);

      // Auto-scroll to show latest text
      const section = $sourceText.parentElement;
      section.scrollTop = section.scrollHeight;

      maybeQueueLiveTranslation();
    }

    // ===== Result =====
    function showResult(original, translation) {
      $sourceText.textContent = original;
      $sourceText.className = 'text-display fade-in';
      adaptFontSize($sourceText, original);

      $targetText.textContent = translation;
      $targetText.className = 'text-display fade-in';
      adaptFontSize($targetText, translation);

      $copyLabel.textContent = 'Копіювати';
      $speakLabel.textContent = 'Озвучити';
      $speakBtn.classList.remove('loading', 'playing');
      clearSpeakSpinner();
      $actionRow.classList.add('visible');

      // Switch to editable textareas
      $sourceText.style.display = 'none';
      $targetText.style.display = 'none';

      $sourceEdit.value = original;
      $sourceEdit.style.display = 'block';
      adaptFontSize($sourceEdit, original);
      autoResizeTextarea($sourceEdit);

      $targetEdit.value = translation;
      $targetEdit.style.display = 'block';
      adaptFontSize($targetEdit, translation);
      autoResizeTextarea($targetEdit);

      lastTranslatedSourceText = (original || '').trim();
      updateTranslateBtnVisibility();
      $contentCard.classList.add('result-layout');
      $sourceSection.scrollTop = 0;
      $targetSection.scrollTop = 0;
      ttsCachedText = null;
    }

    // ===== Re-translate =====
    async function handleTranslateBtn() {
      const text = $sourceEdit.value.trim();
      if (!text) return;
      finalText = text;
      setState('processing');
      try {
        const data = await translateRequest(text);
        showResult(text, data.translation);
        setState('result');
      } catch (err) {
        showError(err.message || 'Помилка перекладу');
        setState('idle');
      }
    }

    // ===== Copy =====
    function copyTranslation() {
      const text = getTargetText();
      if (!text) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          $copyLabel.textContent = 'Скопійовано!';
          setTimeout(() => { $copyLabel.textContent = 'Копіювати'; }, 1500);
        }).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        $copyLabel.textContent = 'Скопійовано!';
      } catch (e) {
        $copyLabel.textContent = 'Помилка';
      }
      setTimeout(() => { $copyLabel.textContent = 'Копіювати'; }, 1500);
      document.body.removeChild(ta);
    }

    // ===== TTS =====
    async function speakTranslation() {
      const text = getTargetText();
      if (!text) return;

      // If already playing, stop
      if (ttsPlaying && ttsAudio) {
        ttsAudio.pause();
        ttsAudio.currentTime = 0;
        ttsPlaying = false;
        $speakBtn.classList.remove('playing', 'loading');
        clearSpeakSpinner();
        $speakLabel.textContent = 'Озвучити';
        return;
      }

      // Use cached audio if same text
      if (ttsCachedText === text && ttsAudio) {
        ttsAudio.currentTime = 0;
        ttsPlaying = true;
        $speakBtn.classList.add('playing');
        $speakLabel.textContent = 'Зупинити';
        ttsAudio.play();
        return;
      }

      $speakBtn.classList.add('loading');
      $speakBtn.querySelector('svg').insertAdjacentHTML('afterend', '<span class="btn-spinner"></span>');
      $speakLabel.textContent = 'Завантаження...';

      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, language: currentTarget })
        });

        if (!res.ok) throw new Error('TTS failed');

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        if (ttsAudio) {
          ttsAudio.pause();
          URL.revokeObjectURL(ttsAudio.src);
        }

        ttsAudio = new Audio(url);
        ttsCachedText = text;

        ttsAudio.onended = () => {
          ttsPlaying = false;
          $speakBtn.classList.remove('playing');
          $speakLabel.textContent = 'Озвучити';
        };

        ttsAudio.onerror = () => {
          ttsPlaying = false;
          $speakBtn.classList.remove('playing', 'loading');
          clearSpeakSpinner();
          $speakLabel.textContent = 'Озвучити';
          showError('Помилка відтворення');
        };

        $speakBtn.classList.remove('loading');
        clearSpeakSpinner();
        $speakBtn.classList.add('playing');
        $speakLabel.textContent = 'Зупинити';
        ttsPlaying = true;
        await ttsAudio.play();
      } catch (err) {
        showError('Помилка озвучення');
        ttsPlaying = false;
        $speakBtn.classList.remove('loading', 'playing');
        clearSpeakSpinner();
        $speakLabel.textContent = 'Озвучити';
      }
    }

    // ===== Error =====
    function showError(msg) {
      $errorToast.textContent = msg;
      $errorToast.classList.add('visible');
      setTimeout(() => { $errorToast.classList.remove('visible'); }, 3500);
    }

    // ===== Waveform =====
    function drawWaveform() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = 48;

      ctx.clearRect(0, 0, w, h);

      const accent = getComputedStyle(document.documentElement).getPropertyValue('--text-hint').trim() || '#C4BEB6';

      if (state === 'recording' && analyserNode && dataArray) {
        analyserNode.getByteTimeDomainData(dataArray);

        ctx.lineWidth = 1.8;
        ctx.strokeStyle = 'var(--recording)';
        ctx.strokeStyle = '#E53935';
        ctx.globalAlpha = 0.7;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();

        // Sample fewer points for smoother look
        const step = 6;
        const sliceWidth = w / (dataArray.length / step);
        let x = 0;

        for (let i = 0; i < dataArray.length; i += step) {
          const v = dataArray[i] / 128.0;
          const y = (v * h) / 2;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
          x += sliceWidth;
        }

        ctx.stroke();
        ctx.globalAlpha = 1.0;

        animationId = requestAnimationFrame(drawWaveform);
      } else {
        // Flat line
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = accent;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.moveTo(0, h / 2);
        ctx.lineTo(w, h / 2);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
      }
    }

    // ===== Audio helpers (ElevenLabs) =====
    function downsample(buffer, fromRate, toRate) {
      if (fromRate === toRate) return buffer;
      const ratio = fromRate / toRate;
      const newLength = Math.round(buffer.length / ratio);
      const result = new Float32Array(newLength);
      for (let i = 0; i < newLength; i++) result[i] = buffer[Math.round(i * ratio)];
      return result;
    }

    function floatTo16BitPCM(arr) {
      const out = new Int16Array(arr.length);
      for (let i = 0; i < arr.length; i++) {
        const s = Math.max(-1, Math.min(1, arr[i]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return out;
    }

    function arrayBufferToBase64(buf) {
      const bytes = new Uint8Array(buf);
      let bin = '';
      for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // ===== Edit mode listeners =====
    $sourceEdit.addEventListener('input', () => {
      adaptFontSize($sourceEdit, $sourceEdit.value);
      autoResizeTextarea($sourceEdit);
      updateTranslateBtnVisibility();
    });
    $targetEdit.addEventListener('input', () => {
      adaptFontSize($targetEdit, $targetEdit.value);
      autoResizeTextarea($targetEdit);
      ttsCachedText = null;
    });
    $translateBtn.addEventListener('click', handleTranslateBtn);
    // Enter = newline (no translation trigger)

    // Idle tap-to-type
    $sourceSection.addEventListener('click', (e) => {
      if (state !== 'idle') return;
      if (e.target.closest('.lang-name')) return;
      $sourceText.style.display = 'none';
      $sourceEdit.value = '';
      $sourceEdit.style.display = 'block';
      lastTranslatedSourceText = '';
      updateTranslateBtnVisibility();
      $sourceEdit.focus();
      $tapHint.classList.add('hidden');
    });

    // ===== Start =====
    init();
  </script>
</body>
</html>
